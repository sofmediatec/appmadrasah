<!DOCTYPE html>
<html>
<head>
  <title>Login Admin - CBT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #0d6efd, #0dcaf0);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      border-radius: 15px;
    }

    .login-title {
      font-weight: bold;
    }

    .btn-primary {
      border-radius: 30px;
    }
  </style>
</head>

<body>

<div class="card login-card shadow p-4">

  <div class="text-center mb-4">
    <h4 class="login-title">Login Admin CBT</h4>
    <small class="text-muted">Silakan masuk untuk mengelola data</small>
  </div>

  <form id="formLogin">

    <div class="mb-3">
      <label>Email</label>
      <input id="email" class="form-control" type="email" placeholder="admin@gmail.com" required>
    </div>

    <div class="mb-3">
      <label>Password</label>
      <input id="password" class="form-control" type="password" placeholder="••••••••" required>
    </div>

    <button class="btn btn-primary w-100" id="btnLogin">
      Login
    </button>

  </form>

  <div id="errorBox" class="alert alert-danger mt-3 d-none"></div>

</div>

<script src="../assets/app.js"></script>

<script>
// ========================
// AUTO REDIRECT JIKA SUDAH LOGIN
// ========================
if(localStorage.token){
  window.location = "dashboard.html";
}

// ========================
// LOGIN
// ========================
document.getElementById("formLogin").onsubmit = function(e){
  e.preventDefault();

  const btn = document.getElementById("btnLogin");
  const errorBox = document.getElementById("errorBox");

  btn.innerText = "Loading...";
  btn.disabled = true;
  errorBox.classList.add("d-none");

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  // VALIDASI
  if(!email || !password){
    showError("Email dan password wajib diisi");
    return resetBtn();
  }

  post("login", { email, password })
    .then(res => {

      if(res.status === "success"){
        localStorage.token = res.token;
        localStorage.user = JSON.stringify(res.user);

        window.location = "dashboard.html";
      } else {
        showError(res.message || "Login gagal");
        resetBtn();
      }

    })
    .catch(() => {
      showError("Gagal koneksi ke server");
      resetBtn();
    });

  function resetBtn(){
    btn.innerText = "Login";
    btn.disabled = false;
  }

  function showError(msg){
    errorBox.innerText = msg;
    errorBox.classList.remove("d-none");
  }
};
</script>

</body>
</html>
