<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin CBT</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }

.hero {
    background: linear-gradient(135deg,#059669,#065f46);
}

.btn-login {
    background: linear-gradient(135deg,#059669,#10b981);
    transition: all .3s;
}
.btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(16,185,129,0.3);
}
.btn-login:disabled{
    opacity: .7;
    transform: none;
    box-shadow: none;
}
</style>
</head>

<body class="bg-slate-100">

<!-- HEADER (SAMA SEPERTI HALAMAN BAYAR) -->
<header class="hero text-white text-center py-14 relative overflow-hidden">
    
    <div class="absolute top-0 left-0 w-32 h-32 bg-white opacity-5 rounded-full -translate-x-1/2 -translate-y-1/2"></div>
    <div class="absolute bottom-0 right-0 w-48 h-48 bg-white opacity-5 rounded-full translate-x-1/3 translate-y-1/3"></div>
    
    <div class="relative z-10">
        <!-- FIX DI SINI -->
        <a href="index.html" 
           class="inline-flex items-center space-x-2 mb-6 text-blue-200 hover:text-white transition-all hover:-translate-x-1">
            
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>

            <span class="font-bold text-sm">Kembali ke Beranda</span>
        </a>

        <h1 class="text-3xl font-black">Login Admin CBT</h1>
        <p class="text-blue-100 mt-2">Silakan login untuk melanjutkan</p>
    </div>
</header>

<!-- CONTENT -->
<main class="max-w-md mx-auto px-6 -mt-10">

<div class="bg-white p-8 rounded-3xl shadow-lg">

    <!-- ERROR -->
    <div id="errorBox" 
         class="hidden mb-4 text-red-600 text-sm font-semibold bg-red-50 p-3 rounded-xl">
    </div>

    <form id="formLogin" class="space-y-5">

        <div>
            <label class="text-sm font-bold text-slate-600">Email</label>
            <input id="email" type="email"
            class="w-full mt-1 px-4 py-3 border rounded-xl focus:ring-2 focus:ring-emerald-400 outline-none"
            placeholder="admin@email.com"
            required>
        </div>

        <div>
            <label class="text-sm font-bold text-slate-600">Password</label>
            <input id="password" type="password"
            class="w-full mt-1 px-4 py-3 border rounded-xl focus:ring-2 focus:ring-emerald-400 outline-none"
            placeholder="••••••••"
            required>
        </div>

        <button id="btnLogin"
        class="btn-login w-full text-white py-3 rounded-xl font-bold flex justify-center items-center gap-2">

            <span id="btnText">Login</span>

            <svg id="loader" class="w-5 h-5 animate-spin hidden" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" stroke="white" stroke-width="4" fill="none"/>
            </svg>

        </button>

    </form>

</div>

</main>

<script src="../assets/app.js"></script>

<script>

// AUTO REDIRECT
if(localStorage.getItem("token")){
    window.location.href = "admin/dashboard.html";
}

const form = document.getElementById("formLogin");
const btn = document.getElementById("btnLogin");
const btnText = document.getElementById("btnText");
const loader = document.getElementById("loader");
const errorBox = document.getElementById("errorBox");

function setLoading(state){
    btn.disabled = state;
    btnText.innerText = state ? "Loading..." : "Login";
    loader.classList.toggle("hidden", !state);
}

function showError(msg){
    errorBox.innerText = msg;
    errorBox.classList.remove("hidden");
}

function hideError(){
    errorBox.classList.add("hidden");
}

// LOGIN
form.addEventListener("submit", async (e) => {
    e.preventDefault();

    hideError();
    setLoading(true);

    try {
        const email = document.getElementById("email").value.trim().toLowerCase();
        const password = document.getElementById("password").value.trim();

        if(!email || !password){
            throw new Error("Email & password wajib diisi");
        }

        const res = await post("login", { email, password });

        if(!res || res.status !== "success"){
            throw new Error(res?.message || "Email atau password salah");
        }

        localStorage.setItem("token", res.token);
        localStorage.setItem("user", JSON.stringify(res.user));

        btnText.innerText = "Berhasil...";

        setTimeout(() => {
            window.location.href = "admin/dashboard.html";
        }, 500);

    } catch (err) {
        showError(err.message);
        setLoading(false);
    }
});

</script>

</body>
</html>
