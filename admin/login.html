<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | CBT Madrasah</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            -webkit-font-smoothing: antialiased;
        }
        .form-input {
            @apply w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-blue-600 focus:ring-2 focus:ring-blue-100 outline-none transition-all bg-white font-medium text-slate-900 placeholder:text-slate-400;
        }
        .form-label {
            @apply block text-xs font-black uppercase tracking-widest text-slate-700 mb-2 ml-1;
        }
        .btn-login {
            @apply w-full bg-blue-700 text-white font-black py-4 rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-800 transition-all transform hover:-translate-y-0.5 active:scale-[0.98] uppercase tracking-widest text-sm flex items-center justify-center space-x-2 disabled:opacity-70 disabled:transform-none;
        }
        .loader {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 2px solid #fff;
            width: 18px;
            height: 18px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative">

    <!-- DEKORASI LATAR BELAKANG -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 -left-4 w-72 h-72 bg-blue-400 rounded-full mix-blend-multiply filter blur-[80px] opacity-20 animate-blob"></div>
        <div class="absolute top-0 -right-4 w-72 h-72 bg-emerald-400 rounded-full mix-blend-multiply filter blur-[80px] opacity-20 animate-blob" style="animation-delay: 2s"></div>
        <div class="absolute -bottom-8 left-20 w-72 h-72 bg-purple-400 rounded-full mix-blend-multiply filter blur-[80px] opacity-20 animate-blob" style="animation-delay: 4s"></div>
    </div>

    <main class="w-full max-w-[420px] relative z-10" data-aos="fade-up" data-aos-duration="800">
        <!-- BRANDING -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-blue-700 rounded-2xl shadow-xl shadow-blue-200 mb-5 transform -rotate-3">
                <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A10.003 10.003 0 0014 20.222m1.07-1.912A9.99 9.99 0 0016 12V7l-4-2-4 2v5n" />
                </svg>
            </div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">Login Admin</h1>
            <p class="text-slate-600 font-semibold mt-2">Selamat datang kembali di panel kontrol.</p>
        </div>

        <!-- KARTU LOGIN -->
        <div class="bg-white rounded-[2rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] p-8 md:p-10 border border-slate-100">
            <!-- BOX NOTIFIKASI ERROR -->
            <div id="errorBox" class="hidden mb-6 p-4 bg-red-50 border-l-4 border-red-600 text-red-800 text-sm font-bold rounded-r-xl">
                <div class="flex items-center">
                    <svg class="w-5 h-5 mr-2 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                    <span id="errorMessage"></span>
                </div>
            </div>

            <form id="formLogin" class="space-y-5">
                <div>
                    <label class="form-label">Email Admin</label>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-600 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                        </span>
                        <input id="email" type="email" class="form-input pl-11" placeholder="nama@madrasah.id" required>
                    </div>
                </div>

                <div>
                    <label class="form-label">Kata Sandi</label>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-600 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                        </span>
                        <input id="password" type="password" class="form-input pl-11" placeholder="Masukkan password" required>
                    </div>
                </div>

                <div class="pt-3">
                    <button type="submit" id="btnLogin" class="btn-login">
                        <span id="btnText">Masuk Sekarang</span>
                        <div id="btnLoader" class="loader hidden"></div>
                    </button>
                </div>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-100 flex items-center justify-center">
                <a href="../index.html" class="text-xs font-black text-slate-500 hover:text-blue-700 uppercase tracking-widest transition-all inline-flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                    Beranda
                </a>
            </div>
        </div>

        <p class="text-center text-slate-500 text-[10px] mt-8 font-bold uppercase tracking-[0.2em]">
            Sistem CBT Madrasah &bull; Versi 2.0
        </p>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Fallback jika app.js tidak ada agar tidak terjadi error fatal -->
    <script>
        // Mock function post jika assets/app.js gagal dimuat
        if (typeof post === 'undefined') {
            window.post = async function(endpoint, data) {
                console.warn("Fungsi post() tidak ditemukan di app.js. Menggunakan simulasi.");
                return new Promise((resolve) => {
                    setTimeout(() => {
                        resolve({ status: "error", message: "Fungsi koneksi server (app.js) belum terhubung." });
                    }, 1000);
                });
            };
        }
    </script>
    <script src="../assets/app.js"></script>

    <script>
    // Inisialisasi AOS dengan aman
    try {
        AOS.init();
    } catch(e) {
        console.error("AOS gagal dimuat");
    }

    if(localStorage.token) window.location = "dashboard.html";

    const form = document.getElementById("formLogin");
    const btn = document.getElementById("btnLogin");
    const btnText = document.getElementById("btnText");
    const btnLoader = document.getElementById("btnLoader");
    const errorBox = document.getElementById("errorBox");
    const errorMessage = document.getElementById("errorMessage");

    form.onsubmit = async function(e){
        e.preventDefault();

        // UI State: Loading
        btnText.classList.add("hidden");
        btnLoader.classList.remove("hidden");
        btn.disabled = true;
        errorBox.classList.add("hidden");

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        try {
            // Memastikan fungsi post tersedia
            if (typeof post !== 'function') throw new Error("Koneksi aplikasi (app.js) tidak tersedia.");

            const res = await post("login", { email, password });
            
            if(res && res.status === "success"){
                localStorage.token = res.token;
                localStorage.user = JSON.stringify(res.user);
                btnText.innerText = "MENGALIHKAN...";
                btnLoader.classList.add("hidden");
                btnText.classList.remove("hidden");
                setTimeout(() => { window.location = "dashboard.html"; }, 600);
            } else {
                showError(res.message || "Email atau password tidak valid");
                resetBtn();
            }
        } catch (err) {
            showError(err.message || "Gagal terhubung ke server");
            resetBtn();
        }
    };

    function resetBtn(){
        btnText.classList.remove("hidden");
        btnText.innerText = "Masuk Sekarang";
        btnLoader.classList.add("hidden");
        btn.disabled = false;
    }

    function showError(msg){
        errorMessage.innerText = msg;
        errorBox.classList.remove("hidden");
        // Scroll ke atas error box jika di mobile
        errorBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    </script>
</body>
</html>
