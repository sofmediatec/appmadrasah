<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin CBT</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }

.bg-main {
    background: linear-gradient(135deg,#059669,#065f46);
}

.btn-login {
    background: linear-gradient(135deg,#059669,#10b981);
    transition: all .3s;
}
.btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(16,185,129,0.3);
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center bg-slate-100">

<div class="w-full max-w-md">

<!-- HEADER -->
<div class="bg-main text-white text-center py-10 rounded-t-3xl shadow-lg">
<h1 class="text-2xl font-bold">Admin CBT</h1>
<p class="text-sm opacity-90">Silakan login untuk melanjutkan</p>
</div>

<!-- CARD -->
<div class="bg-white p-8 rounded-b-3xl shadow-lg">

<div id="errorBox" class="hidden mb-4 text-red-600 text-sm font-semibold"></div>

<form id="formLogin" class="space-y-5">

<div>
<label class="text-sm font-bold text-slate-600">Email</label>
<input id="email" type="email"
class="w-full mt-1 px-4 py-3 border rounded-xl focus:ring-2 focus:ring-emerald-400 outline-none"
required>
</div>

<div>
<label class="text-sm font-bold text-slate-600">Password</label>
<input id="password" type="password"
class="w-full mt-1 px-4 py-3 border rounded-xl focus:ring-2 focus:ring-emerald-400 outline-none"
required>
</div>

<button id="btnLogin"
class="btn-login w-full text-white py-3 rounded-xl font-bold flex justify-center items-center gap-2">

<span id="btnText">Login</span>

<svg id="loader" class="w-5 h-5 animate-spin hidden" viewBox="0 0 24 24">
<circle cx="12" cy="12" r="10" stroke="white" stroke-width="4" fill="none"/>
</svg>

</button>

</form>

</div>

</div>

<script src="../assets/app.js"></script>

<script>
// ================= AUTH CHECK =================
if(localStorage.token){
    location="dashboard.html";
}

// ================= LOGIN =================
const form = document.getElementById("formLogin");
const btnText = document.getElementById("btnText");
const loader = document.getElementById("loader");
const errorBox = document.getElementById("errorBox");

form.onsubmit = async function(e){
e.preventDefault();

btnText.innerText="Loading...";
loader.classList.remove("hidden");

try{
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if(!email || !password) throw "Isi semua field";

    const res = await post("login",{email,password});

    if(!res || res.status !== "success"){
        throw res?.message || "Login gagal";
    }

    localStorage.token = res.token;
    localStorage.user = JSON.stringify(res.user);

    btnText.innerText="Masuk...";
    location="dashboard.html";

}catch(err){
    errorBox.innerText = err;
    errorBox.classList.remove("hidden");

    btnText.innerText="Login";
    loader.classList.add("hidden");
}
};
</script>

</body>
</html>
