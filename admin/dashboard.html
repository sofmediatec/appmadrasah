<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin CBT</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
}

.glass {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 1);
}

.card {
    border-radius: 24px;
    padding: 24px;
    color: white;
    transition: .3s;
}
.card:hover { transform: translateY(-5px); }

.card-blue { background: linear-gradient(135deg,#2563eb,#1d4ed8); }
.card-yellow { background: linear-gradient(135deg,#d97706,#b45309); }
.card-green { background: linear-gradient(135deg,#059669,#064e3b); }
.card-purple { background: linear-gradient(135deg,#7c3aed,#5b21b6); }

.badge {
    padding: 6px 14px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 800;
}

thead th {
    background:#0f172a;
    color:#fff;
}
thead th.sortable {
    cursor:pointer;
}
thead th.sortable:hover {
    background:#1e293b;
}
</style>
</head>

<body class="p-6">

<h1 class="text-2xl font-bold mb-4">Dashboard Admin CBT</h1>

<!-- FILTER -->
<div class="flex gap-3 mb-4">
<input id="search" placeholder="Cari..." class="border p-2 rounded w-full">
<select id="filterStatus" class="border p-2 rounded">
<option value="">Semua</option>
<option value="pending">Pending</option>
<option value="disetujui">Disetujui</option>
<option value="ditolak">Ditolak</option>
<option value="lunas">Lunas</option>
</select>
<button onclick="exportExcel()" class="bg-green-600 text-white px-4 rounded">Export</button>
</div>

<!-- TABLE -->
<table class="w-full border">
<thead>
<tr>
<th onclick="setSort('id')" class="sortable p-2">ID</th>
<th onclick="setSort('nama_madrasah')" class="sortable p-2">Madrasah</th>
<th onclick="setSort('status_order')" class="sortable p-2">Status</th>
<th onclick="setSort('status_pembayaran')" class="sortable p-2">Bayar</th>
<th class="p-2">Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script src="../assets/app.js"></script>
<script>

const token = localStorage.getItem("token");
if(!token) location="login.html";

let allData = [];
let filteredData = [];

let sortKey = null;
let sortAsc = true;

// fallback
if (!window.get) window.get = async ()=>({status:"success",data:[]});
if (!window.post) window.post = async ()=>({status:"success"});

// ================= LOAD DATA =================
async function loadData(){
    const res = await get("dashboard");
    if(res.status==="success"){
        allData = res.data || [];
        render();
    }
}

// ================= SORT =================
function setSort(key){
    if(sortKey===key){
        sortAsc=!sortAsc;
    }else{
        sortKey=key;
        sortAsc=true;
    }
    render();
}

// ================= COLOR =================
function getStatusColor(status){
    if(!status) return '';
    status = status.toLowerCase();
    if(status==="disetujui"||status==="lunas") return 'bg-green-200';
    if(status==="pending") return 'bg-yellow-200';
    if(status==="ditolak") return 'bg-red-200';
    return '';
}

// ================= RENDER =================
function render(){

    const search = document.getElementById("search").value.toLowerCase();
    const filterStatus = document.getElementById("filterStatus").value;

    filteredData = allData.filter(r=>{
        const txt = `${r.id} ${r.nama_madrasah}`.toLowerCase();
        if(search && !txt.includes(search)) return false;

        if(filterStatus){
            if(filterStatus==="lunas"){
                return r.status_pembayaran==="lunas";
            }
            return r.status_order===filterStatus;
        }

        return true;
    });

    // SORT
    if(sortKey){
        filteredData.sort((a,b)=>{
            let v1 = a[sortKey]||"";
            let v2 = b[sortKey]||"";

            if(!isNaN(v1)&&!isNaN(v2)){
                return sortAsc ? v1-v2 : v2-v1;
            }

            return sortAsc 
                ? String(v1).localeCompare(String(v2))
                : String(v2).localeCompare(String(v1));
        });
    }

    let html="";

    filteredData.forEach(r=>{
        html+=`
        <tr>
            <td class="p-2">${r.id}</td>
            <td class="p-2">${r.nama_madrasah}</td>
            <td class="p-2"><span class="badge ${getStatusColor(r.status_order)}">${r.status_order}</span></td>
            <td class="p-2"><span class="badge ${getStatusColor(r.status_pembayaran)}">${r.status_pembayaran}</span></td>
            <td class="p-2">
                <button onclick="openDetail('${r.id}')">Detail</button>
            </td>
        </tr>`;
    });

    document.getElementById("tbody").innerHTML = html;
}

// ================= EXPORT =================
function exportExcel(){
    let csv="ID,Nama,Status,Bayar\n";
    filteredData.forEach(r=>{
        csv+=`${r.id},${r.nama_madrasah},${r.status_order},${r.status_pembayaran}\n`;
    });

    const blob = new Blob([csv]);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download="data.csv";
    a.click();
}

// ================= AUTO REFRESH =================
setInterval(()=>{
    loadData();
},10000);

// ================= INIT =================
window.onload=()=>{
    loadData();
    document.getElementById("search").oninput=render;
    document.getElementById("filterStatus").onchange=render;
}

</script>
</body>
</html>
