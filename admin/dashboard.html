<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Admin CBT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f5f7fa; }
    .card { border-radius: 12px; }
    .btn-sm { padding: 4px 8px; }
  </style>
</head>

<body>

<div class="container py-4">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4>Dashboard Admin CBT</h4>
    <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
  </div>

  <!-- FILTER -->
  <div class="card p-3 mb-3">
    <div class="row g-2">
      <div class="col-md-6">
        <input id="search" class="form-control" placeholder="Cari nama / ID">
      </div>
      <div class="col-md-3">
        <select id="filterStatus" class="form-select">
          <option value="">Semua Status</option>
          <option value="pending">Pending</option>
          <option value="disetujui">Disetujui</option>
          <option value="ditolak">Ditolak</option>
        </select>
      </div>
      <div class="col-md-3">
        <select id="filterBayar" class="form-select">
          <option value="">Semua Pembayaran</option>
          <option value="lunas">Lunas</option>
          <option value="menunggu_verifikasi">Menunggu</option>
          <option value="ditolak">Ditolak</option>
        </select>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div class="row mb-4 text-center">
    <div class="col-md-3"><div class="card p-3">Total<br><h5 id="total">0</h5></div></div>
    <div class="col-md-3"><div class="card p-3">Pending<br><h5 id="pending">0</h5></div></div>
    <div class="col-md-3"><div class="card p-3">Disetujui<br><h5 id="approved">0</h5></div></div>
    <div class="col-md-3"><div class="card p-3">Lunas<br><h5 id="paid">0</h5></div></div>
  </div>

  <!-- TABLE -->
  <div class="card p-3">
    <div class="table-responsive">
      <table class="table table-bordered table-striped align-middle">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Madrasah</th>
            <th>HP</th>
            <th>Status</th>
            <th>Pembayaran</th>
            <th>CBT</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="7" class="text-center">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="../assets/app.js"></script>

<script>
const token = localStorage.getItem("token");
if(!token) location="login.html";

let allData = [];

// ================= LOAD DATA =================
async function loadData(){
  const res = await get("pendaftaran");

  if(res.status !== "success"){
    alert(res.message);
    return;
  }

  allData = res.data.slice(1);
  render();
}

// ================= RENDER =================
function render(){
  const tbody = document.getElementById("tbody");
  const search = document.getElementById("search").value.toLowerCase();
  const fStatus = document.getElementById("filterStatus").value;
  const fBayar = document.getElementById("filterBayar").value;

  let html = "";
  let total=0,pending=0,approved=0,paid=0;

  allData.forEach(r=>{

    const id = r[0];
    const nama = r[3] || "-";
    const hp = r[9] || "-";
    const status = (r[14]||"pending").toLowerCase();
    const bayar = (r[15]||"belum_bayar").toLowerCase();
    const link = r[16];

    // FILTER
    if(search && !(`${id} ${nama}`.toLowerCase().includes(search))) return;
    if(fStatus && status!==fStatus) return;
    if(fBayar && bayar!==fBayar) return;

    total++;
    if(status==="pending") pending++;
    if(status==="disetujui") approved++;
    if(bayar==="lunas") paid++;

    const sBadge = status==="pending"?"warning":status==="disetujui"?"success":"danger";
    const bBadge = bayar==="lunas"?"success":bayar==="menunggu_verifikasi"?"warning":bayar==="ditolak"?"danger":"secondary";

    html+=`
    <tr>
      <td>${id}</td>
      <td>${nama}</td>
      <td>${hp}</td>

      <td><span class="badge bg-${sBadge}">${status}</span></td>
      <td><span class="badge bg-${bBadge}">${bayar}</span></td>

      <td>
        ${link ? `<a href="${link}" target="_blank" class="btn btn-primary btn-sm">Buka</a>`
               : `<button class="btn btn-secondary btn-sm" onclick="setLink('${id}')">Isi</button>`}
      </td>

      <td class="d-flex gap-1 flex-wrap">
        <button class="btn btn-success btn-sm" onclick="approve('${id}')">Approve</button>
        <button class="btn btn-danger btn-sm" onclick="tolak('${id}')">Tolak</button>
        <button class="btn btn-warning btn-sm" onclick="lunas('${id}')">Lunas</button>
      </td>
    </tr>`;
  });

  tbody.innerHTML = html || `<tr><td colspan="7" class="text-center">Tidak ada data</td></tr>`;

  document.getElementById("total").innerText=total;
  document.getElementById("pending").innerText=pending;
  document.getElementById("approved").innerText=approved;
  document.getElementById("paid").innerText=paid;
}

// ================= ACTION =================
function approve(id){
  const link = prompt("Link CBT:");
  post("update_order",{id,status_order:"disetujui",link_cbt:link||""},token)
  .then(()=>loadData());
}

function tolak(id){
  if(!confirm("Tolak?")) return;
  post("update_order",{id,status_order:"ditolak"},token)
  .then(()=>loadData());
}

function lunas(id){
  if(!confirm("Set LUNAS?")) return;
  post("update_order",{id,status_bayar:"lunas"},token)
  .then(()=>loadData());
}

function setLink(id){
  const link = prompt("Link CBT:");
  if(!link) return;
  post("update_order",{id,link_cbt:link},token)
  .then(()=>loadData());
}

// ================= EVENT =================
document.getElementById("search").oninput = render;
document.getElementById("filterStatus").onchange = render;
document.getElementById("filterBayar").onchange = render;

// ================= LOGOUT =================
function logout(){
  localStorage.clear();
  location="login.html";
}

loadData();
</script>

</body>
</html>
