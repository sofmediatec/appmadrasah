<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin CBT</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<!-- Icon -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body {
    font-family: 'Inter', sans-serif;
    background-color: #f1f5f9;
}

/* CARD STYLE (sesuai dashboard kamu) */
.stat-card {
    @apply p-6 rounded-[1.5rem] border shadow-sm transition-all hover:shadow-md border-opacity-50;
}
.card-blue { @apply bg-white border-blue-100; }
.card-amber { @apply bg-white border-amber-100; }
.card-emerald { @apply bg-white border-emerald-100; }
.card-purple { @apply bg-white border-purple-100; }

.badge {
    @apply px-3 py-1 rounded-full text-[10px] font-bold border;
}

.btn-action {
    @apply p-2 rounded-lg text-white text-xs;
}
</style>
</head>

<body class="p-6">

<h1 class="text-2xl font-bold mb-6">Dashboard Admin CBT</h1>

<!-- ================= FILTER ================= -->
<div class="flex gap-2 mb-4">
<input id="search" placeholder="Cari..." class="border p-2 rounded">

<select id="filterStatus" class="border p-2 rounded">
<option value="">Semua Status</option>
<option value="pending">Pending</option>
<option value="disetujui">Disetujui</option>
<option value="ditolak">Ditolak</option>
</select>

<select id="filterBayar" class="border p-2 rounded">
<option value="">Semua Bayar</option>
<option value="lunas">Lunas</option>
<option value="menunggu_verifikasi">Menunggu</option>
<option value="ditolak">Ditolak</option>
</select>

<button onclick="loadData()" class="bg-blue-600 text-white px-4 rounded">
Refresh
</button>
</div>

<!-- ================= TABLE ================= -->
<table class="w-full border bg-white">
<thead class="bg-slate-800 text-white">
<tr>
<th class="p-2">ID</th>
<th>Nama</th>
<th>HP</th>
<th>Status</th>
<th>Pembayaran</th>
<th>Link</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tbody">
<tr><td colspan="7" class="text-center p-6">Loading...</td></tr>
</tbody>
</table>

<script src="../assets/app.js"></script>

<script>
const token = localStorage.getItem("token");
if(!token) location = "login.html";

let allData = [];

/* ================= LOAD DATA ================= */
async function loadData(){
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = `<tr><td colspan="7" class="text-center p-6">Loading...</td></tr>`;

    try {
        const res = await get("pendaftaran");

        if(!res || res.status !== "success"){
            throw new Error("Gagal ambil data");
        }

        allData = res.data || [];
        render();

    } catch (err) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-red-600 p-6 text-center">${err.message}</td></tr>`;
    }
}

/* ================= RENDER ================= */
function render(){
    const tbody = document.getElementById("tbody");

    const search = document.getElementById("search").value.toLowerCase();
    const fStatus = document.getElementById("filterStatus").value;
    const fBayar = document.getElementById("filterBayar").value;

    let html = "";

    let stats = {
        total: 0,
        pending: 0,
        approved: 0,
        paid: 0
    };

    allData.forEach(r => {

        const id = r[0];
        const nama = r[3] || "-";
        const hp = r[9] || "-";
        const status = (r[14] || "pending").toLowerCase();
        const bayar = (r[15] || "belum_bayar").toLowerCase();
        const link = r[16];

        if(search && !(`${id} ${nama}`.toLowerCase().includes(search))) return;
        if(fStatus && status !== fStatus) return;
        if(fBayar && bayar !== fBayar) return;

        stats.total++;
        if(status === "pending") stats.pending++;
        if(status === "disetujui") stats.approved++;
        if(bayar === "lunas") stats.paid++;

        const sColor = {
            pending: "bg-amber-100 text-amber-700",
            disetujui: "bg-emerald-100 text-emerald-700",
            ditolak: "bg-red-100 text-red-700"
        };

        const bColor = {
            lunas: "bg-blue-100 text-blue-700",
            menunggu_verifikasi: "bg-amber-100 text-amber-700",
            ditolak: "bg-red-100 text-red-700",
            belum_bayar: "bg-slate-100 text-slate-600"
        };

        html += `
        <tr class="border-b">
            <td class="p-2">#${id}</td>
            <td>${nama}</td>
            <td>${hp}</td>

            <td>
                <span class="badge ${sColor[status] || ''}">${status}</span>
            </td>

            <td>
                <span class="badge ${bColor[bayar] || ''}">${bayar}</span>
            </td>

            <td>
                ${link ? `<a class="text-blue-600" target="_blank" href="${link}">Buka</a>` : "-"}
            </td>

            <td class="flex gap-2">
                <button onclick="approve(${id})" class="btn-action bg-green-600">✔</button>
                <button onclick="lunas(${id})" class="btn-action bg-blue-600">💳</button>
                <button onclick="tolak(${id})" class="btn-action bg-red-600">✖</button>
            </td>
        </tr>
        `;
    });

    tbody.innerHTML = html || `<tr><td colspan="7" class="p-6 text-center">Tidak ada data</td></tr>`;
}

/* ================= ACTION ================= */
async function approve(id){
    const link = prompt("Link CBT (optional)");
    await post("update_order", {id, status_order:"disetujui", link_cbt: link}, token);
    loadData();
}

async function tolak(id){
    if(!confirm("Tolak data ini?")) return;
    await post("update_order", {id, status_order:"ditolak"}, token);
    loadData();
}

async function lunas(id){
    if(!confirm("Tandai lunas?")) return;
    await post("update_pembayaran", {pendaftaran_id:id, status:"lunas"}, token);
    loadData();
}

/* ================= FILTER EVENT ================= */
document.getElementById("search").oninput = render;
document.getElementById("filterStatus").onchange = render;
document.getElementById("filterBayar").onchange = render;

loadData();
</script>

</body>
</html>
