<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin CBT</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="icon" href="data:,">

<style>
body { font-family: 'Inter', sans-serif; }

.card {
    border-radius: 16px;
    padding: 18px;
    color: white;
    position: relative;
}
.card .icon {
    position: absolute;
    right: 10px;
    bottom: 10px;
    opacity: 0.2;
    transform: scale(2.5);
}

.card-blue { background: linear-gradient(135deg,#3b82f6,#1e3a8a); }
.card-yellow { background: linear-gradient(135deg,#f59e0b,#b45309); }
.card-green { background: linear-gradient(135deg,#10b981,#065f46); }
.card-purple { background: linear-gradient(135deg,#8b5cf6,#4c1d95); }

.badge {
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: bold;
}

.skeleton {
    animation: pulse 1.5s infinite;
    background: #e5e7eb;
    border-radius: 6px;
}
@keyframes pulse {
    0%{opacity:1} 50%{opacity:.5} 100%{opacity:1}
}
</style>
</head>

<body class="bg-slate-100 p-6">

<script src="../assets/app.js"></script>

<!-- NAVBAR -->
<div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">Dashboard CBT</h1>
    <div class="flex gap-2">
        <button onclick="exportExcel()" class="bg-green-600 text-white px-3 py-2 rounded">Excel</button>
        <button onclick="window.print()" class="bg-purple-600 text-white px-3 py-2 rounded">PDF</button>
        <button onclick="logout()" class="bg-red-600 text-white px-3 py-2 rounded">Logout</button>
    </div>
</div>

<!-- STATS -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
    <div class="card card-blue"><div>Total</div><div id="total" class="text-3xl font-bold">0</div><i data-lucide="users" class="icon"></i></div>
    <div class="card card-yellow"><div>Pending</div><div id="pending" class="text-3xl font-bold">0</div><i data-lucide="clock" class="icon"></i></div>
    <div class="card card-green"><div>Disetujui</div><div id="approved" class="text-3xl font-bold">0</div><i data-lucide="check-circle" class="icon"></i></div>
    <div class="card card-purple"><div>Lunas</div><div id="paid" class="text-3xl font-bold">0</div><i data-lucide="credit-card" class="icon"></i></div>
</div>

<!-- FILTER -->
<div class="bg-white p-4 rounded shadow mb-4 flex gap-3 flex-wrap">
    <input id="search" class="border p-2 rounded" placeholder="Cari...">
    <select id="filterStatus" class="border p-2 rounded">
        <option value="">Status</option>
        <option value="pending">Pending</option>
        <option value="disetujui">Disetujui</option>
        <option value="ditolak">Ditolak</option>
    </select>
    <select id="filterBayar" class="border p-2 rounded">
        <option value="">Bayar</option>
        <option value="lunas">Lunas</option>
        <option value="menunggu_verifikasi">Menunggu</option>
    </select>
</div>

<!-- TABLE -->
<div class="bg-white rounded shadow overflow-auto">
<table class="w-full text-sm">
<thead class="bg-slate-900 text-white">
<tr>
<th class="p-3">ID</th>
<th class="p-3">Madrasah</th>
<th class="p-3">HP</th>
<th class="p-3">Status</th>
<th class="p-3">Bayar</th>
<th class="p-3">Bukti</th>
<th class="p-3">Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<!-- PAGINATION -->
<div class="mt-3 flex justify-between">
<button onclick="prevPage()">Prev</button>
<button onclick="nextPage()">Next</button>
</div>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center">
<div class="bg-white p-6 rounded w-96">
<h2 class="font-bold mb-3">Edit Data</h2>

<select id="mStatus" class="border w-full p-2 mb-2">
<option value="pending">Pending</option>
<option value="disetujui">Disetujui</option>
<option value="ditolak">Ditolak</option>
</select>

<select id="mBayar" class="border w-full p-2 mb-2">
<option value="belum_bayar">Belum</option>
<option value="lunas">Lunas</option>
</select>

<input id="mLink" class="border w-full p-2 mb-3" placeholder="Link CBT">

<div class="flex justify-end gap-2">
<button onclick="closeModal()">Batal</button>
<button onclick="saveEdit()" class="bg-blue-600 text-white px-3 rounded">Simpan</button>
</div>
</div>
</div>

<script>
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user")||"{}");

let allData=[], page=1, limit=10, editId=null;

/* ================= FIX DRIVE ================= */
function fixDriveUrl(url){
    if(!url) return "";
    if(url.includes("drive.google.com")){
        const id = url.match(/[-\w]{25,}/);
        if(id) return `https://drive.google.com/uc?export=view&id=${id[0]}`;
    }
    return url;
}

/* ================= LOAD ================= */
async function loadData(){
    document.getElementById("tbody").innerHTML =
    `<tr><td colspan="7"><div class="skeleton h-6 w-full"></div></td></tr>`;

    const res = await get("dashboard");

    if(!res || res.status !== "success"){
        document.getElementById("tbody").innerHTML =
        `<tr><td colspan="7" class="text-center text-red-600">Gagal load data</td></tr>`;
        return;
    }

    allData = res.data;
    render();
}

/* ================= RENDER ================= */
function render(){

    const search = document.getElementById("search").value.toLowerCase();
    const fStatus = document.getElementById("filterStatus").value;
    const fBayar = document.getElementById("filterBayar").value;

    let filtered = allData.filter(r=>{
        const id = r[0];
        const nama = r[3] || "";
        const status = (r[14]||"").toLowerCase();
        const bayar = (r[15]||"").toLowerCase();

        if(search && !(`${id} ${nama}`.toLowerCase().includes(search))) return false;
        if(fStatus && status !== fStatus) return false;
        if(fBayar && bayar !== fBayar) return false;

        return true;
    });

    let start=(page-1)*limit;
    let data=filtered.slice(start,start+limit);

    let html="",stats={total:filtered.length,pending:0,approved:0,paid:0};

    filtered.forEach(r=>{
        const status=r[14],bayar=r[15];
        if(status==="pending")stats.pending++;
        if(status==="disetujui")stats.approved++;
        if(bayar==="lunas")stats.paid++;
    });

    data.forEach(r=>{
        const id=r[0],nama=r[3],hp=r[9];
        const status=r[14],bayar=r[15];
        const bukti=r[r.length-1];

        html+=`
        <tr class="border">
        <td>${id}</td>
        <td>${nama}</td>
        <td>${hp}</td>
        <td><span class="badge bg-yellow-100">${status}</span></td>
        <td><span class="badge bg-green-100">${bayar}</span></td>
        <td>
        ${bukti
            ? `<img src="${fixDriveUrl(bukti)}"
                    class="w-12 h-12 object-cover rounded cursor-pointer border"
                    onclick="preview('${fixDriveUrl(bukti)}')">`
            : "-"
        }
        </td>
        <td>
        ${user.role==="admin"
            ? `<button onclick="openModal('${id}')" class="text-blue-600">Edit</button>`
            : "-"
        }
        </td>
        </tr>`;
    });

    document.getElementById("tbody").innerHTML =
        html || `<tr><td colspan="7" class="text-center p-6">Tidak ada data</td></tr>`;

    document.getElementById("total").innerText = stats.total;
    document.getElementById("pending").innerText = stats.pending;
    document.getElementById("approved").innerText = stats.approved;
    document.getElementById("paid").innerText = stats.paid;

    lucide.createIcons();
}

/* ================= PAGINATION ================= */
function nextPage(){ page++; render(); }
function prevPage(){ if(page>1) page--; render(); }

/* ================= MODAL ================= */
function openModal(id){
    editId=id;
    document.getElementById("modal").classList.remove("hidden");
}
function closeModal(){
    document.getElementById("modal").classList.add("hidden");
}
async function saveEdit(){
    await post("update_order",{
        id:editId,
        status_order:mStatus.value,
        status_bayar:mBayar.value,
        link_cbt:mLink.value
    },token);

    closeModal();
    loadData();
}

/* ================= PREVIEW ================= */
function preview(url){
    window.open(url,"_blank");
}

/* ================= EXPORT ================= */
function exportExcel(){
    let csv="ID,Nama,HP\n";
    allData.forEach(r=>{
        csv+=`${r[0]},${r[3]},${r[9]}\n`;
    });

    const blob=new Blob([csv]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="data.csv";
    a.click();
}

/* ================= INIT ================= */
window.onload=()=>{
    loadData();

    document.getElementById("search").oninput=render;
    document.getElementById("filterStatus").onchange=render;
    document.getElementById("filterBayar").onchange=render;
};
</script>

</body>
</html>
