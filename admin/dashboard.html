<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Admin CBT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f5f7fa; }
    .card { border-radius: 12px; }
  </style>
</head>

<body>

<div class="container py-4">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4>Dashboard Admin</h4>
    <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
  </div>

  <!-- STATS -->
  <div class="row mb-4 text-center">
    <div class="col-md-3"><div class="card p-3">Total<br><h5 id="total">0</h5></div></div>
    <div class="col-md-3"><div class="card p-3">Pending<br><h5 id="pending">0</h5></div></div>
    <div class="col-md-3"><div class="card p-3">Disetujui<br><h5 id="approved">0</h5></div></div>
    <div class="col-md-3"><div class="card p-3">Lunas<br><h5 id="paid">0</h5></div></div>
  </div>

  <!-- TABLE -->
  <div class="card p-3">
    <div class="table-responsive">
      <table class="table table-bordered table-striped align-middle" id="table">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Madrasah</th>
            <th>HP</th>
            <th>Status Order</th>
            <th>Pembayaran</th>
            <th>CBT</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="7" class="text-center">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="../assets/app.js"></script>

<script>
const token = localStorage.token;

// ===================
// PROTEKSI LOGIN
// ===================
if(!token){
  location = "login.html";
}

// ===================
// LOAD DATA
// ===================
async function loadData(){

  document.querySelector("#table tbody").innerHTML =
    `<tr><td colspan="7" class="text-center">Loading...</td></tr>`;

  try{
    const res = await get("pendaftaran");

    if(res.status === "error"){
      throw new Error(res.message);
    }

    let html = "";
    let total=0, pending=0, approved=0, paid=0;

    const rows = res.data || [];

    if(rows.length <= 1){
      document.querySelector("#table tbody").innerHTML =
        `<tr><td colspan="7" class="text-center">Tidak ada data</td></tr>`;
      return;
    }

    rows.slice(1).forEach(r => {

      total++;

      const id = r[0];
      const nama = r[3];
      const hp = r[9];
      const status = r[14];
      const bayar = r[15];
      const link = r[16];

      if(status === "pending") pending++;
      if(status === "disetujui") approved++;
      if(bayar === "lunas") paid++;

      const statusBadge =
        status === "pending" ? "warning" :
        status === "disetujui" ? "success" : "secondary";

      const bayarBadge =
        bayar === "lunas" ? "success" :
        bayar === "menunggu_verifikasi" ? "warning" :
        bayar === "ditolak" ? "danger" : "secondary";

      html += `
      <tr>
        <td>${id}</td>
        <td>${nama}</td>
        <td>${hp}</td>

        <td>
          <span class="badge bg-${statusBadge}">${status}</span><br>
          <button class="btn btn-sm btn-outline-primary mt-1"
            onclick="updateStatus('${id}')">Ubah</button>
        </td>

        <td>
          <span class="badge bg-${bayarBadge}">${bayar}</span><br>
          <button class="btn btn-sm btn-outline-warning mt-1"
            onclick="verifikasi('${id}')">Verifikasi</button>
        </td>

        <td>
          ${link 
            ? `<a href="${link}" target="_blank" class="btn btn-sm btn-primary">Buka</a>`
            : `<button class="btn btn-sm btn-outline-secondary" onclick="setLink('${id}')">Isi Link</button>`
          }
        </td>

        <td>
          <button class="btn btn-success btn-sm" onclick="approve('${id}')">
            Approve
          </button>
        </td>
      </tr>
      `;
    });

    document.querySelector("#table tbody").innerHTML = html;

    totalEl.innerText = total;
    pendingEl.innerText = pending;
    approvedEl.innerText = approved;
    paidEl.innerText = paid;

  }catch(err){
    document.querySelector("#table tbody").innerHTML =
      `<tr><td colspan="7" class="text-danger text-center">${err.message}</td></tr>`;
  }
}

const totalEl = document.getElementById("total");
const pendingEl = document.getElementById("pending");
const approvedEl = document.getElementById("approved");
const paidEl = document.getElementById("paid");

// ===================
// UPDATE STATUS ORDER
// ===================
function updateStatus(id){
  const status = prompt("Status order (pending / disetujui)");

  if(!status) return;

  post("update_status", {id, status}, token)
    .then(res => {
      if(res.status !== "success"){
        alert(res.message);
        return;
      }
      alert("Status diupdate");
      loadData();
    });
}

// ===================
// SET LINK CBT
// ===================
function setLink(id){
  const link = prompt("Masukkan link CBT");

  if(!link) return;

  post("set_link", {id, link_cbt:link}, token)
    .then(res => {
      if(res.status !== "success"){
        alert(res.message);
        return;
      }
      alert("Link disimpan");
      loadData();
    });
}

// ===================
// APPROVE
// ===================
function approve(id){
  const link = prompt("Masukkan link CBT");

  if(!link) return;

  post("approve", {id, link_cbt:link}, token)
    .then(res => {
      if(res.status !== "success"){
        alert(res.message);
        return;
      }
      alert("Order disetujui");
      loadData();
    });
}

// ===================
// VERIFIKASI PEMBAYARAN
// ===================
function verifikasi(id){

  const status = prompt("Status (valid / ditolak)");
  if(!status) return;

  get("pembayaran").then(res => {

    const data = (res.data || []).find(r => String(r[1]) === String(id));

    if(!data){
      alert("Belum ada pembayaran");
      return;
    }

    post("verifikasi", {
      id: data[0],
      status
    }, token).then(res => {

      if(res.status !== "success"){
        alert(res.message);
        return;
      }

      alert("Berhasil verifikasi");
      loadData();
    });
  });
}

// ===================
// LOGOUT
// ===================
function logout(){
  localStorage.clear();
  location = "login.html";
}

// init
loadData();
</script>

</body>
</html>
