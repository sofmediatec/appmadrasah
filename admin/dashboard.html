<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin CBT</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }

.card {
    border-radius: 16px;
    padding: 18px;
    color: white;
}
.card-blue { background: linear-gradient(135deg,#3b82f6,#1e3a8a); }
.card-yellow { background: linear-gradient(135deg,#f59e0b,#b45309); }
.card-green { background: linear-gradient(135deg,#10b981,#065f46); }
.card-purple { background: linear-gradient(135deg,#8b5cf6,#4c1d95); }

.badge {
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: bold;
}

.skeleton {
    animation: pulse 1.5s infinite;
    background: #e5e7eb;
    border-radius: 6px;
}
@keyframes pulse {
    0%{opacity:1} 50%{opacity:.5} 100%{opacity:1}
}
</style>
</head>

<body class="bg-slate-100 p-6">

<script src="../assets/app.js"></script>

<!-- NAVBAR -->
<div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">Dashboard CBT</h1>
    <div class="flex gap-2">
        <button onclick="exportExcel()" class="bg-green-600 text-white px-3 py-2 rounded">Excel</button>
        <button onclick="window.print()" class="bg-purple-600 text-white px-3 py-2 rounded">PDF</button>
        <button onclick="logout()" class="bg-red-600 text-white px-3 py-2 rounded">Logout</button>
    </div>
</div>

<!-- STATS -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
    <div class="card card-blue"><div>Total</div><div id="total" class="text-3xl font-bold">0</div></div>
    <div class="card card-yellow"><div>Pending</div><div id="pending" class="text-3xl font-bold">0</div></div>
    <div class="card card-green"><div>Disetujui</div><div id="approved" class="text-3xl font-bold">0</div></div>
    <div class="card card-purple"><div>Lunas</div><div id="paid" class="text-3xl font-bold">0</div></div>
</div>

<!-- SEARCH -->
<div class="bg-white p-4 rounded shadow mb-4">
    <input id="search" class="border p-2 rounded w-full" placeholder="Cari nama / ID...">
</div>

<!-- TABLE -->
<div class="bg-white rounded shadow overflow-auto">
<table class="w-full text-sm">
<thead class="bg-slate-900 text-white">
<tr>
<th class="p-3">ID</th>
<th class="p-3">Madrasah</th>
<th class="p-3">HP</th>
<th class="p-3">Status</th>
<th class="p-3">Bayar</th>
<th class="p-3">Bukti</th>
<th class="p-3">Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
<div class="bg-white p-6 rounded w-96">

<h2 class="font-bold mb-3">Detail Pendaftaran</h2>

<div class="mb-2 text-sm text-gray-600">
ID: <span id="dId"></span>
</div>

<img id="dBukti" class="w-full h-40 object-cover rounded mb-3 border hidden">

<select id="dStatus" class="border w-full p-2 mb-2">
<option value="pending">Pending</option>
<option value="disetujui">Disetujui</option>
<option value="ditolak">Ditolak</option>
</select>

<select id="dBayar" class="border w-full p-2 mb-2">
<option value="belum_bayar">Belum Bayar</option>
<option value="menunggu_verifikasi">Menunggu</option>
<option value="lunas">Lunas</option>
</select>

<input id="dLink" class="border w-full p-2 mb-3" placeholder="Link CBT">

<div class="flex justify-end gap-2">
<button onclick="closeModal()">Batal</button>
<button onclick="saveDetail()" class="bg-blue-600 text-white px-3 rounded">Simpan</button>
</div>

</div>
</div>

<script>
const token = localStorage.getItem("token");
if(!token) location="login.html";

const user = JSON.parse(localStorage.getItem("user")||"{}");

let allData=[];
let selectedId=null;

/* ================= FIX DRIVE ================= */
function fixDriveUrl(url){
    if(!url) return "";

    let id="";
    if(url.includes("id=")){
        id = url.split("id=")[1];
    } else {
        const match = url.match(/[-\w]{25,}/);
        if(match) id = match[0];
    }

    return id
        ? `https://drive.google.com/uc?export=view&id=${id}`
        : url;
}

/* ================= LOAD ================= */
async function loadData(){
    const tbody=document.getElementById("tbody");

    tbody.innerHTML=`<tr><td colspan="7" class="p-6">
        <div class="skeleton h-6 w-full"></div>
    </td></tr>`;

    try{
        const res = await get("dashboard");

        if(res.status!=="success") throw new Error(res.message);

        allData = res.data;
        render();

    }catch(err){
        tbody.innerHTML=`<tr><td colspan="7" class="text-red-600 text-center">${err.message}</td></tr>`;
    }
}

/* ================= RENDER ================= */
function render(){
    const tbody=document.getElementById("tbody");
    const search=document.getElementById("search").value.toLowerCase();

    let html="";
    let stats={pending:0,approved:0,paid:0};

    allData.forEach(r=>{

        const id=r.id;
        const nama=r.nama_madrasah||"-";
        const hp=r.no_hp||"-";
        const status=(r.status_order||"pending").toLowerCase();
        const bayar=(r.status_pembayaran||"belum_bayar").toLowerCase();
        const bukti=fixDriveUrl(r.bukti_url);

        if(search && !(`${id} ${nama}`.toLowerCase().includes(search))) return;

        if(status==="pending")stats.pending++;
        if(status==="disetujui")stats.approved++;
        if(bayar==="lunas")stats.paid++;

        html+=`
        <tr class="border">
            <td class="p-2">${id}</td>
            <td class="p-2">${nama}</td>
            <td class="p-2">${hp}</td>

            <td class="p-2">
                <span class="badge bg-yellow-100">${status}</span>
            </td>

            <td class="p-2">
                <span class="badge bg-green-100">${bayar}</span>
            </td>

            <td class="p-2">
                ${bukti ? `
                    <img src="${bukti}"
                        class="w-12 h-12 object-cover rounded border cursor-pointer"
                        onclick="window.open('${bukti}')"
                        onerror="this.src='https://via.placeholder.com/50?text=Error'">
                ` : "-"}
            </td>

            <td class="p-2">
                ${user?.role==="admin"
                    ? `<button onclick="openDetail('${id}')" class="bg-blue-600 text-white px-2 py-1 rounded text-xs">Detail</button>`
                    : "-"
                }
            </td>
        </tr>`;
    });

    tbody.innerHTML=html;

    document.getElementById("total").innerText=allData.length;
    document.getElementById("pending").innerText=stats.pending;
    document.getElementById("approved").innerText=stats.approved;
    document.getElementById("paid").innerText=stats.paid;
}

/* ================= MODAL ================= */
function openDetail(id){
    const r = allData.find(x=>x.id==id);
    if(!r) return;

    selectedId=id;

    dId.innerText=id;
    dStatus.value=r.status_order||"pending";
    dBayar.value=r.status_pembayaran||"belum_bayar";
    dLink.value=r.link_cbt||"";

    const bukti=fixDriveUrl(r.bukti_url);
    const img=document.getElementById("dBukti");

    if(bukti){
        img.src=bukti;
        img.classList.remove("hidden");
    }else{
        img.classList.add("hidden");
    }

    document.getElementById("modal").classList.remove("hidden");
}

function closeModal(){
    document.getElementById("modal").classList.add("hidden");
}

/* ================= SAVE ================= */
async function saveDetail(){
    await post("updateStatus",{
        id:selectedId,
        status:dStatus.value,
        admin_id:user.id
    },token);

    closeModal();
    loadData();
}

/* ================= EXPORT ================= */
function exportExcel(){
    let csv="ID,Nama,HP\n";

    allData.forEach(r=>{
        csv+=`${r.id},${r.nama_madrasah},${r.no_hp}\n`;
    });

    const blob=new Blob([csv]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="data.csv";
    a.click();
}

function logout(){
    localStorage.clear();
    location="login.html";
}

/* ================= INIT ================= */
window.onload=()=>{
    loadData();
    document.getElementById("search").oninput=render;
};
</script>

</body>
</html>
