<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin CBT</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body class="bg-slate-100 p-6">

<h1 class="text-2xl font-bold mb-6">Dashboard Admin CBT</h1>

<!-- STATS -->
<div class="grid grid-cols-4 gap-4 mb-6">
<div>Total: <b id="total">0</b></div>
<div>Pending: <b id="pending">0</b></div>
<div>Disetujui: <b id="approved">0</b></div>
<div>Lunas: <b id="paid">0</b></div>
</div>

<!-- FILTER -->
<div class="flex gap-2 mb-4">
<input id="search" placeholder="Cari..." class="border p-2 rounded">
<select id="filterStatus" class="border p-2">
<option value="">Semua Status</option>
<option value="pending">Pending</option>
<option value="disetujui">Disetujui</option>
<option value="ditolak">Ditolak</option>
</select>
<select id="filterBayar" class="border p-2">
<option value="">Semua Bayar</option>
<option value="lunas">Lunas</option>
<option value="menunggu_verifikasi">Menunggu</option>
<option value="ditolak">Ditolak</option>
</select>
<button onclick="loadData()" class="bg-blue-600 text-white px-4">Refresh</button>
</div>

<!-- TABLE -->
<table class="w-full border bg-white">
<thead class="bg-black text-white">
<tr>
<th>ID</th>
<th>Nama</th>
<th>HP</th>
<th>Status</th>
<th>Bayar</th>
<th>Link</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script src="../assets/app.js"></script>

<script>
const token = localStorage.getItem("token");
if(!token) location="login.html";

let allData = [];

/* ================= LOAD ================= */
async function loadData(){
    const res = await get("pendaftaran");

    console.log(res);

    // 🔥 FIX: tidak perlu status success
    if(!res || !Array.isArray(res.data)){
        alert("Data gagal dimuat");
        return;
    }

    allData = res.data.slice(1); // skip header
    render();
}

/* ================= RENDER ================= */
function render(){
    const tbody = document.getElementById("tbody");
    const search = document.getElementById("search").value.toLowerCase();
    const fStatus = document.getElementById("filterStatus").value;
    const fBayar = document.getElementById("filterBayar").value;

    let html = "";
    let total=0, pending=0, approved=0, paid=0;

    allData.forEach(r => {

        const id = r[0];
        const nama = r[3];
        const hp = r[9];
        const status = (r[14]||"pending").toLowerCase();
        const bayar = (r[15]||"belum_bayar").toLowerCase();
        const link = r[16];

        if(search && !(`${id} ${nama}`.toLowerCase().includes(search))) return;
        if(fStatus && status !== fStatus) return;
        if(fBayar && bayar !== fBayar) return;

        total++;
        if(status==="pending") pending++;
        if(status==="disetujui") approved++;
        if(bayar==="lunas") paid++;

        html += `
        <tr class="border">
            <td>${id}</td>
            <td>${nama}</td>
            <td>${hp}</td>
            <td>${status}</td>
            <td>${bayar}</td>
            <td>${link ? `<a href="${link}" target="_blank">Buka</a>` : "-"}</td>
            <td>
                <button onclick="approve('${id}')">✔</button>
                <button onclick="lunas('${id}')">💳</button>
                <button onclick="tolak('${id}')">✖</button>
            </td>
        </tr>`;
    });

    tbody.innerHTML = html || `<tr><td colspan="7">Tidak ada data</td></tr>`;

    document.getElementById("total").innerText = total;
    document.getElementById("pending").innerText = pending;
    document.getElementById("approved").innerText = approved;
    document.getElementById("paid").innerText = paid;
}

/* ================= ACTION ================= */

async function approve(id){
    const link = prompt("Link CBT:");
    await post("update_order",{id, status_order:"disetujui", link_cbt:link}, token);
    loadData();
}

async function tolak(id){
    await post("update_order",{id, status_order:"ditolak"}, token);
    loadData();
}

async function lunas(id){
    await post("update_order",{id, status_bayar:"lunas"}, token);
    loadData();
}

/* ================= EVENT ================= */
document.getElementById("search").oninput = render;
document.getElementById("filterStatus").onchange = render;
document.getElementById("filterBayar").onchange = render;

loadData();
</script>

</body>
</html>
