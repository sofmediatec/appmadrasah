    <script>
    lucide.createIcons();

    const token = localStorage.getItem("token");
    if(!token) location="login.html";

    let allData = [];

    async function loadData(){
        try {
            const res = await get("pendaftaran");
            if(res.status !== "success"){
                alert(res.message);
                return;
            }
            allData = res.data.slice(1);
            render();
        } catch (e) {
            console.error(e);
        }
}
}

function render(){
    const tbody = document.getElementById("tbody");
    const search = document.getElementById("search").value.toLowerCase();
    const fStatus = document.getElementById("filterStatus").value;
    const fBayar = document.getElementById("filterBayar").value;

    let html = "";
    let total=0, pending=0, approved=0, paid=0;

    allData.forEach(r => {

        if(!r || r.length < 5) return;

        const id = r[0] || "-";
        const nama = r[3] || "-";
        const hp = r[9] || "-";

        const status = (r[14] || "pending").toLowerCase();
        const bayar = (r[15] || "belum_bayar").toLowerCase();
        const link = r[16];

        // FILTER
        if(search && !(`${id} ${nama}`.toLowerCase().includes(search))) return;
        if(fStatus && status !== fStatus) return;
        if(fBayar && bayar !== fBayar) return;

        total++;
        if(status==="pending") pending++;
        if(status==="disetujui") approved++;
        if(bayar==="lunas") paid++;

        html += `
        <tr class="border">
        <td>${id}</td>
        <td>${nama}</td>
        <td>${hp}</td>

        <td><span class="badge bg-yellow-100">${status}</span></td>
        <td><span class="badge bg-green-100">${bayar}</span></td>

        <td>
        ${link ? `<a href="${link}" target="_blank">Buka</a>` : "-"}
        </td>
    function render(){
        const tbody = document.getElementById("tbody");
        const search = document.getElementById("search").value.toLowerCase();
        const fStatus = document.getElementById("filterStatus").value;
        const fBayar = document.getElementById("filterBayar").value;

        let html = "";
        let stats = { total: 0, pending: 0, approved: 0, paid: 0 };

        allData.forEach(r => {
            const id = r[0];
            const nama = r[3] || "-";
            const hp = r[9] || "-";
            const status = (r[14]||"pending").toLowerCase();
            const bayar = (r[15]||"belum_bayar").toLowerCase();
            const link = r[16];

            if(search && !(`${id} ${nama}`.toLowerCase().includes(search))) return;
            if(fStatus && status !== fStatus) return;
            if(fBayar && bayar !== fBayar) return;

            stats.total++;
            if(status === "pending") stats.pending++;
            if(status === "disetujui") stats.approved++;
            if(bayar === "lunas") stats.paid++;

            const sColors = {
                pending: 'bg-amber-50 text-amber-700 border-amber-200',
                disetujui: 'bg-emerald-50 text-emerald-700 border-emerald-200',
                ditolak: 'bg-red-50 text-red-700 border-red-200'
            };
            const bColors = {
                lunas: 'bg-blue-50 text-blue-700 border-blue-200',
                menunggu_verifikasi: 'bg-amber-50 text-amber-700 border-amber-200',
                ditolak: 'bg-red-50 text-red-700 border-red-200',
                belum_bayar: 'bg-slate-50 text-slate-600 border-slate-200'
            };

            html += `
            <tr class="hover:bg-slate-50/80 transition-colors">
                <td class="px-6 py-5 font-black text-slate-400 text-[10px]">#${id}</td>
                <td class="px-6 py-5 font-black text-slate-900 text-sm tracking-tight">${nama}</td>
                <td class="px-6 py-5 font-bold text-slate-600 text-xs tracking-tighter italic">${hp}</td>
                <td class="px-6 py-5"><span class="badge ${sColors[status] || 'bg-slate-100 text-slate-500'}">${status}</span></td>
                <td class="px-6 py-5"><span class="badge ${bColors[bayar] || 'bg-slate-100 text-slate-500'}">${bayar.replace('_', ' ')}</span></td>
                <td class="px-6 py-5 text-center">
                    ${link ? 
                        `<a href="${link}" target="_blank" class="inline-flex items-center bg-blue-600 text-white px-3 py-1.5 rounded-lg font-black text-[10px] hover:bg-blue-700 transition-all shadow-md shadow-blue-100 uppercase">
                            Buka Link <i data-lucide="external-link" class="w-3 h-3 ml-1.5"></i>
                         </a>` : 
                        `<button onclick="setLink('${id}')" class="text-blue-600 hover:text-blue-800 font-black text-[10px] uppercase tracking-widest border-b-2 border-blue-100">Isi Link</button>`}
                </td>
                <td class="px-6 py-5">
                    <div class="flex items-center justify-center gap-2">
                        <button onclick="approve('${id}')" title="Setujui" class="btn-action bg-emerald-600 text-white hover:bg-emerald-700 shadow-lg shadow-emerald-100">
                            <i data-lucide="check" class="w-4 h-4"></i>
                        </button>
                        <button onclick="lunas('${id}')" title="Lunas" class="btn-action bg-blue-600 text-white hover:bg-blue-700 shadow-lg shadow-blue-100">
                            <i data-lucide="credit-card" class="w-4 h-4"></i>
                        </button>
                        <button onclick="tolak('${id}')" title="Tolak" class="btn-action bg-red-600 text-white hover:bg-red-700 shadow-lg shadow-red-100">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>
                    </div>
                </td>
            </tr>`;
        });

        tbody.innerHTML = html || `<tr><td colspan="7" class="px-6 py-32 text-center text-slate-400 font-black uppercase tracking-widest text-xs">Data Tidak Ditemukan</td></tr>`;
        
        document.getElementById("total").innerText = stats.total;
        document.getElementById("pending").innerText = stats.pending;
        document.getElementById("approved").innerText = stats.approved;
        document.getElementById("paid").innerText = stats.paid;
        document.getElementById("showingCount").innerText = `Menampilkan ${stats.total} data pendaftaran`;
        
        lucide.createIcons();
    }

        <td class="flex gap-1">
        <button onclick="approve('${id}')" class="btn-action bg-green-600">✔</button>
        <button onclick="lunas('${id}')" class="btn-action bg-blue-600">💳</button>
        <button onclick="tolak('${id}')" class="btn-action bg-red-600">✖</button>
        </td>
        </tr>`;
    });
    async function approve(id){
        const link = prompt("Masukkan Link CBT (Opsional):");
        if(link === null) return;
        await post("update_order", { id, status_order: "disetujui", link_cbt: link }, token);
        loadData();
    }

    tbody.innerHTML = html || `<tr><td colspan="7">Tidak ada data</td></tr>`;
    async function tolak(id){
        if(!confirm("Yakin ingin menolak pendaftaran ini?")) return;
        await post("update_order", { id, status_order: "ditolak" }, token);
        loadData();
    }

    document.getElementById("total").innerText = total;
    document.getElementById("pending").innerText = pending;
    document.getElementById("approved").innerText = approved;
    document.getElementById("paid").innerText = paid;
}
    async function lunas(id){
        if(!confirm("Setatus pembayaran menjadi LUNAS?")) return;
        await post("update_order", { id, status_bayar: "lunas" }, token);
        loadData();
    }

/* ================= ACTION ================= */
    async function setLink(id){
        const link = prompt("Masukkan URL CBT Madrasah:");
        if(!link) return;
        await post("update_order", { id, link_cbt: link }, token);
        loadData();
    }

async function approve(id){
    await post("update_order",{id, status_order:"disetujui"}, token);
    loadData();
}
    function logout(){
        if(!confirm("Keluar dari panel admin?")) return;
        localStorage.clear();
        location="login.html";
    }

async function tolak(id){
    await post("update_order",{id, status_order:"ditolak"}, token);
    loadData();
}
    document.getElementById("search").oninput = render;
    document.getElementById("filterStatus").onchange = render;
    document.getElementById("filterBayar").onchange = render;

async function lunas(id){
    await post("update_pembayaran",{pendaftaran_id:id, status:"lunas"}, token);
loadData();
}

/* ================= FILTER ================= */

document.getElementById("search").oninput = render;
document.getElementById("filterStatus").onchange = render;
document.getElementById("filterBayar").onchange = render;

loadData();
</script>
