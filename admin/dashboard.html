<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin | CBT Madrasah</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body { font-family: 'Inter', sans-serif; background:#f1f5f9; }
.badge { padding:4px 10px; border-radius:999px; font-size:10px; font-weight:800; border:1px solid #ddd; }
.btn { padding:6px; border-radius:10px; color:white; font-size:12px; }
</style>
</head>

<body class="p-6">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-black">Dashboard Admin</h1>
    <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded-lg text-xs">Logout</button>
</div>

<!-- STATS -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
    <div class="bg-white p-4 rounded-xl shadow">
        <p class="text-xs">Total</p>
        <h2 id="total" class="text-xl font-bold">0</h2>
    </div>
    <div class="bg-white p-4 rounded-xl shadow">
        <p class="text-xs">Pending</p>
        <h2 id="pending" class="text-xl font-bold text-yellow-600">0</h2>
    </div>
    <div class="bg-white p-4 rounded-xl shadow">
        <p class="text-xs">Disetujui</p>
        <h2 id="approved" class="text-xl font-bold text-green-600">0</h2>
    </div>
    <div class="bg-white p-4 rounded-xl shadow">
        <p class="text-xs">Lunas</p>
        <h2 id="paid" class="text-xl font-bold text-blue-600">0</h2>
    </div>
</div>

<!-- FILTER -->
<div class="bg-white p-4 rounded-xl shadow mb-4 flex flex-wrap gap-2">
    <input id="search" placeholder="Cari..." class="border p-2 rounded w-48">
    
    <select id="filterStatus" class="border p-2 rounded">
        <option value="">Semua Status</option>
        <option value="pending">Pending</option>
        <option value="disetujui">Disetujui</option>
        <option value="ditolak">Ditolak</option>
    </select>

    <select id="filterBayar" class="border p-2 rounded">
        <option value="">Semua Bayar</option>
        <option value="lunas">Lunas</option>
        <option value="menunggu_verifikasi">Menunggu</option>
        <option value="ditolak">Ditolak</option>
    </select>

    <button onclick="loadData()" class="bg-blue-600 text-white px-4 rounded">Refresh</button>
</div>

<!-- TABLE -->
<div class="bg-white rounded-xl shadow overflow-x-auto">
<table class="w-full text-sm">
<thead class="bg-gray-800 text-white">
<tr>
<th class="p-3">ID</th>
<th class="p-3">Nama</th>
<th class="p-3">HP</th>
<th class="p-3">Status</th>
<th class="p-3">Bayar</th>
<th class="p-3">Link</th>
<th class="p-3">Aksi</th>
</tr>
</thead>
<tbody id="tbody">
<tr><td colspan="7" class="text-center p-6">Loading...</td></tr>
</tbody>
</table>
</div>

<script src="../assets/app.js"></script>

<script>
const token = getToken();
if(!token) location="login.html";

let allData = [];

/* ================= LOAD ================= */
async function loadData(){
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = `<tr><td colspan="7" class="text-center p-6">Loading...</td></tr>`;

    try{
        const res = await get("pendaftaran", {}, token);

        if(!res || !res.data){
            throw new Error("Data kosong");
        }

        // auto fix header
        if(Array.isArray(res.data[0]) && String(res.data[0][0]).toLowerCase()==="id"){
            allData = res.data.slice(1);
        } else {
            allData = res.data;
        }

        render();

    }catch(err){
        tbody.innerHTML = `<tr><td colspan="7" class="text-red-600 text-center">${err.message}</td></tr>`;
    }
}

/* ================= RENDER ================= */
function render(){
    const tbody = document.getElementById("tbody");
    const search = document.getElementById("search").value.toLowerCase();
    const fStatus = document.getElementById("filterStatus").value;
    const fBayar = document.getElementById("filterBayar").value;

    let html="";
    let total=0, pending=0, approved=0, paid=0;

    allData.forEach(r=>{

        const id = r[0];
        const nama = r[3]||"-";
        const hp = r[9]||"-";
        const status = (r[14]||"pending").toLowerCase();
        const bayar = (r[15]||"belum_bayar").toLowerCase();
        const link = r[16];

        if(search && !(`${id} ${nama}`.includes(search))) return;
        if(fStatus && status!==fStatus) return;
        if(fBayar && bayar!==fBayar) return;

        total++;
        if(status==="pending") pending++;
        if(status==="disetujui") approved++;
        if(bayar==="lunas") paid++;

        html+=`
        <tr class="border-b hover:bg-gray-50">
            <td class="p-2">${id}</td>
            <td class="p-2 font-semibold">${nama}</td>
            <td class="p-2">${hp}</td>

            <td class="p-2">
                <span class="badge bg-yellow-100">${status}</span>
            </td>

            <td class="p-2">
                <span class="badge bg-green-100">${bayar}</span>
            </td>

            <td class="p-2">
                ${link ? `<a href="${link}" target="_blank" class="text-blue-600">Buka</a>`:"-"}
            </td>

            <td class="p-2 flex gap-1">
                <button onclick="approve('${id}')" class="btn bg-green-600">✔</button>
                <button onclick="lunas('${id}')" class="btn bg-blue-600">💳</button>
                <button onclick="tolak('${id}')" class="btn bg-red-600">✖</button>
            </td>
        </tr>`;
    });

    tbody.innerHTML = html || `<tr><td colspan="7" class="text-center p-6">Tidak ada data</td></tr>`;

    document.getElementById("total").innerText=total;
    document.getElementById("pending").innerText=pending;
    document.getElementById("approved").innerText=approved;
    document.getElementById("paid").innerText=paid;
}

/* ================= ACTION ================= */
async function approve(id){
    const link = prompt("Link CBT:");
    await post("update_order",{id, status_order:"disetujui", link_cbt:link}, token);
    loadData();
}

async function tolak(id){
    await post("update_order",{id, status_order:"ditolak"}, token);
    loadData();
}

async function lunas(id){
    await post("update_order",{id, status_bayar:"lunas"}, token);
    loadData();
}

function logout(){
    localStorage.clear();
    location="login.html";
}

/* ================= EVENT ================= */
document.getElementById("search").oninput = render;
document.getElementById("filterStatus").onchange = render;
document.getElementById("filterBayar").onchange = render;

loadData();
</script>

</body>
</html>
