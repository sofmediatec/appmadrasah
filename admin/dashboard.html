<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin CBT</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; }

/* GLASS UI */
.glass {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(226,232,240,0.7);
}

/* CARD */
.card {
    border-radius: 20px;
    padding: 20px;
    color: white;
    position: relative;
    overflow: hidden;
    transition: 0.3s;
}
.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 15px 25px rgba(0,0,0,0.1);
}

.card::after{
    content:"";
    position:absolute;
    right:-20px;
    bottom:-20px;
    width:100px;
    height:100px;
    background:rgba(255,255,255,0.1);
    border-radius:50%;
}

/* VARIAN CARD */
.card-blue { background: linear-gradient(135deg,#3b82f6,#1e40af); }
.card-yellow { background: linear-gradient(135deg,#f59e0b,#b45309); }
.card-green { background: linear-gradient(135deg,#10b981,#065f46); }
.card-purple { background: linear-gradient(135deg,#8b5cf6,#4c1d95); }

/* BADGE */
.badge {
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: bold;
}

/* SCROLL */
.custom-scroll::-webkit-scrollbar{height:6px}
.custom-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}

/* ANIMATION */
.fade-in{
    animation:fadeIn .3s ease;
}
@keyframes fadeIn{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body class="bg-slate-100 p-6">

<script src="../assets/app.js"></script>

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-extrabold">Dashboard CBT</h1>
    <div class="flex gap-2">
        <button onclick="exportExcel()" class="bg-emerald-600 text-white px-3 py-2 rounded-lg">Excel</button>
        <button onclick="window.print()" class="bg-indigo-600 text-white px-3 py-2 rounded-lg">PDF</button>
        <button onclick="logout()" class="bg-red-600 text-white px-3 py-2 rounded-lg">Logout</button>
    </div>
</div>

<!-- STATS -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">

    <div class="card card-blue">
        <div class="flex justify-between items-center">
            <div>
                <div class="text-sm opacity-80">Total</div>
                <div id="total" class="text-3xl font-extrabold">0</div>
            </div>
            <div class="text-4xl">📊</div>
        </div>
    </div>

    <div class="card card-yellow">
        <div class="flex justify-between items-center">
            <div>
                <div class="text-sm opacity-80">Pending</div>
                <div id="pending" class="text-3xl font-extrabold">0</div>
            </div>
            <div class="text-4xl">⏳</div>
        </div>
    </div>

    <div class="card card-green">
        <div class="flex justify-between items-center">
            <div>
                <div class="text-sm opacity-80">Disetujui</div>
                <div id="approved" class="text-3xl font-extrabold">0</div>
            </div>
            <div class="text-4xl">✅</div>
        </div>
    </div>

    <div class="card card-purple">
        <div class="flex justify-between items-center">
            <div>
                <div class="text-sm opacity-80">Lunas</div>
                <div id="paid" class="text-3xl font-extrabold">0</div>
            </div>
            <div class="text-4xl">💰</div>
        </div>
    </div>

</div>

<!-- SEARCH -->
<div class="glass p-4 rounded-2xl shadow mb-4">
    <input id="search" class="border p-3 rounded-xl w-full focus:ring-2 focus:ring-blue-500" placeholder="Cari nama / ID...">
</div>

<!-- TABLE -->
<div class="glass rounded-2xl shadow overflow-auto custom-scroll">
<table class="w-full text-sm">
<thead class="bg-slate-900 text-white">
<tr>
<th class="p-3">ID</th>
<th class="p-3">Madrasah</th>
<th class="p-3">HP</th>
<th class="p-3">Status</th>
<th class="p-3">Bayar</th>
<th class="p-3">Bukti</th>
<th class="p-3">Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
<div class="bg-white p-6 rounded-2xl w-96 fade-in">

<h2 class="font-bold mb-3">Detail Pendaftaran</h2>

<div class="mb-2 text-sm text-gray-600">
ID: <span id="dId"></span>
</div>

<img id="dBukti" onclick="window.open(this.src)" 
class="w-full h-40 object-cover rounded mb-3 border hidden cursor-pointer">

<select id="dStatus" class="border w-full p-2 mb-2 rounded">
<option value="pending">⏳ Pending</option>
<option value="disetujui">✅ Disetujui</option>
<option value="ditolak">❌ Ditolak</option>
</select>

<select id="dBayar" class="border w-full p-2 mb-2 rounded">
<option value="belum_bayar">Belum Bayar</option>
<option value="menunggu_verifikasi">Menunggu</option>
<option value="lunas">Lunas</option>
</select>

<input id="dLink" class="border w-full p-2 mb-3 rounded" placeholder="Link CBT">

<div class="flex justify-end gap-2">
<button onclick="closeModal()">Batal</button>
<button onclick="saveDetail()" class="bg-blue-600 text-white px-3 rounded">Simpan</button>
</div>

</div>
</div>

<script>
const token = localStorage.getItem("token");
if(!token) location="login.html";

const user = JSON.parse(localStorage.getItem("user")||"{}");

let allData=[];
let selectedId=null;

function fixDriveUrl(url){
    if(!url) return "";

    let id = "";

    if(url.includes("/file/d/")){
        id = url.split("/file/d/")[1].split("/")[0];
    } else if(url.includes("id=")){
        id = url.split("id=")[1].split("&")[0];
    }

    // 🔥 INI YANG BENAR UNTUK <img>
    return id 
        ? `https://lh3.googleusercontent.com/d/${id}`
        : "";
}

async function loadData(){
    const tbody=document.getElementById("tbody");
    tbody.innerHTML=`<tr><td colspan="7" class="p-6 text-center">Loading...</td></tr>`;
    try{
        const res = await get("dashboard");
        if(res.status!=="success") throw new Error(res.message);
        allData = res.data;
        render();
    }catch(err){
        tbody.innerHTML=`<tr><td colspan="7" class="text-red-600 text-center">${err.message}</td></tr>`;
    }
}

function render(){
    const tbody=document.getElementById("tbody");
    const search=document.getElementById("search").value.toLowerCase();

    let html="";
    let stats={pending:0,approved:0,paid:0};

    allData.forEach(r=>{
        const id=r.id;
        const nama=r.nama_madrasah||"-";
        const hp=r.no_hp||"-";
        const status=(r.status_order||"pending").toLowerCase();
        const bayar=(r.status_pembayaran||"belum_bayar").toLowerCase();
        const bukti=fixDriveUrl(r.bukti_url);

        if(search && !(`${id} ${nama}`.toLowerCase().includes(search))) return;

        if(status==="pending")stats.pending++;
        if(status==="disetujui")stats.approved++;
        if(bayar==="lunas")stats.paid++;

        html+=`
        <tr class="border hover:bg-slate-50">
            <td class="p-2">${id}</td>
            <td class="p-2 font-semibold">${nama}</td>
            <td class="p-2">${hp}</td>

            <td class="p-2">
                <span class="badge bg-yellow-100">${status}</span>
            </td>

            <td class="p-2">
                <span class="badge bg-green-100">${bayar}</span>
            </td>

            <td class="p-2 text-center">
                ${
                    !bukti 
                    ? "-" 
                    : `<img src="${bukti}"
                         class="w-12 h-12 object-cover rounded cursor-pointer border"
                         onclick="openDetail('${id}')">`
                }
            </td>

            <td class="p-2">
                <button onclick="openDetail('${id}')" class="bg-blue-600 text-white px-2 py-1 rounded text-xs">Detail</button>
            </td>
        </tr>`;
    });

    tbody.innerHTML=html;

    total.innerText=allData.length;
    pending.innerText=stats.pending;
    approved.innerText=stats.approved;
    paid.innerText=stats.paid;
}

function openDetail(id){
    const r = allData.find(x=>x.id==id);
    if(!r) return;

    selectedId = id;
    dId.innerText = id;
    dStatus.value = r.status_order || "pending";
    dBayar.value = r.status_pembayaran || "belum_bayar";
    dLink.value = r.link_cbt || "";

    const bukti = fixDriveUrl(r.bukti_url);

    if(bukti){
        dBukti.src = bukti;
        dBukti.classList.remove("hidden");
    } else {
        dBukti.classList.add("hidden");
    }

    modal.classList.remove("hidden");
}

function closeModal(){ modal.classList.add("hidden"); }

async function saveDetail(){
    await post("updateStatus",{
        id:selectedId,
        status_order:dStatus.value,
        status_bayar:dBayar.value,
        link_cbt:dLink.value
    },token);

    closeModal();
    loadData();
}

function exportExcel(){
    let csv="ID,Nama,HP\n";
    allData.forEach(r=>{
        csv+=`${r.id},${r.nama_madrasah},${r.no_hp}\n`;
    });
    const blob=new Blob([csv]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="data.csv";
    a.click();
}

function logout(){
    localStorage.clear();
    location="login.html";
}

window.onload=()=>{
    loadData();
    search.oninput=render;
};
</script>

</body>
</html>
