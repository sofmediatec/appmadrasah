<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin CBT</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100 p-6">

<h1 class="text-2xl font-bold mb-6">Dashboard Admin CBT</h1>

<!-- STATS -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
<div class="bg-white p-4 rounded shadow">Total: <b id="total">0</b></div>
<div class="bg-white p-4 rounded shadow">Pending: <b id="pending">0</b></div>
<div class="bg-white p-4 rounded shadow">Disetujui: <b id="approved">0</b></div>
<div class="bg-white p-4 rounded shadow">Lunas: <b id="paid">0</b></div>
</div>

<!-- FILTER -->
<div class="flex flex-wrap gap-2 mb-4">
<input id="search" placeholder="Cari..." class="border p-2 rounded w-full md:w-48">
<select id="filterStatus" class="border p-2 rounded">
<option value="">Semua Status</option>
<option value="pending">Pending</option>
<option value="disetujui">Disetujui</option>
<option value="ditolak">Ditolak</option>
</select>
<select id="filterBayar" class="border p-2 rounded">
<option value="">Semua Bayar</option>
<option value="lunas">Lunas</option>
<option value="menunggu_verifikasi">Menunggu</option>
<option value="ditolak">Ditolak</option>
</select>
<button onclick="loadData()" class="bg-blue-600 text-white px-4 rounded">Refresh</button>
</div>

<!-- TABLE -->
<div class="overflow-x-auto">
<table class="w-full border bg-white rounded overflow-hidden">
<thead class="bg-slate-800 text-white text-sm">
<tr>
<th class="p-3">ID</th>
<th class="p-3">Nama</th>
<th class="p-3">HP</th>
<th class="p-3">Status</th>
<th class="p-3">Bayar</th>
<th class="p-3">Link</th>
<th class="p-3">Aksi</th>
</tr>
</thead>
<tbody id="tbody">
<tr><td colspan="7" class="text-center p-6">Loading...</td></tr>
</tbody>
</table>
</div>

<script src="../assets/app.js"></script>

<script>
/* ================= INIT ================= */
const token = getToken();
if(!token) location = "login.html";

let allData = [];

/* ================= HELPER ================= */
function safe(val, def="-"){
    return (val === undefined || val === null || val === "") ? def : val;
}

function normalizeData(data){
    if(!Array.isArray(data)) return [];

    // detect header otomatis
    if(Array.isArray(data[0]) && typeof data[0][0] === "string" && data[0][0].toLowerCase() === "id"){
        return data.slice(1);
    }

    return data;
}

function badge(text){
    const map = {
        pending: "bg-yellow-200 text-yellow-800",
        disetujui: "bg-green-200 text-green-800",
        ditolak: "bg-red-200 text-red-800",
        lunas: "bg-blue-200 text-blue-800",
        belum_bayar: "bg-gray-200 text-gray-700",
        menunggu_verifikasi: "bg-orange-200 text-orange-800"
    };
    return `<span class="px-2 py-1 rounded text-xs ${map[text]||'bg-gray-200'}">${text}</span>`;
}

/* ================= LOAD ================= */
async function loadData(){
    try{
        document.getElementById("tbody").innerHTML =
            `<tr><td colspan="7" class="text-center p-6">Loading...</td></tr>`;

        const res = await get("pendaftaran", {}, token);

        if(!res || !res.data) throw new Error("Data tidak ditemukan");

        allData = normalizeData(res.data);

        render();

    }catch(err){
        console.error(err);
        document.getElementById("tbody").innerHTML =
            `<tr><td colspan="7" class="text-center text-red-600 p-6">${err.message}</td></tr>`;
    }
}

/* ================= RENDER ================= */
function render(){
    const tbody = document.getElementById("tbody");
    const search = document.getElementById("search").value.toLowerCase();
    const fStatus = document.getElementById("filterStatus").value;
    const fBayar = document.getElementById("filterBayar").value;

    let html = "";
    let total=0, pending=0, approved=0, paid=0;

    allData.forEach(r => {

        const id     = safe(r[0]);
        const nama   = safe(r[3]);
        const hp     = safe(r[9]);
        const status = safe(r[14],"pending").toLowerCase();
        const bayar  = safe(r[15],"belum_bayar").toLowerCase();
        const link   = r[16];

        if(search && !(`${id} ${nama}`.toLowerCase().includes(search))) return;
        if(fStatus && status !== fStatus) return;
        if(fBayar && bayar !== fBayar) return;

        total++;
        if(status==="pending") pending++;
        if(status==="disetujui") approved++;
        if(bayar==="lunas") paid++;

        html += `
        <tr class="border hover:bg-slate-50">
            <td class="p-2">${id}</td>
            <td class="p-2">${nama}</td>
            <td class="p-2">${hp}</td>
            <td class="p-2">${badge(status)}</td>
            <td class="p-2">${badge(bayar)}</td>
            <td class="p-2">
                ${link ? `<a href="${link}" target="_blank" class="text-blue-600 underline">Buka</a>` : "-"}
            </td>
            <td class="p-2 space-x-1">
                <button onclick="approve('${id}')" class="bg-green-500 text-white px-2 py-1 rounded">✔</button>
                <button onclick="lunas('${id}')" class="bg-blue-500 text-white px-2 py-1 rounded">💳</button>
                <button onclick="tolak('${id}')" class="bg-red-500 text-white px-2 py-1 rounded">✖</button>
            </td>
        </tr>`;
    });

    tbody.innerHTML = html || `<tr><td colspan="7" class="text-center p-6">Tidak ada data</td></tr>`;

    document.getElementById("total").innerText = total;
    document.getElementById("pending").innerText = pending;
    document.getElementById("approved").innerText = approved;
    document.getElementById("paid").innerText = paid;
}

/* ================= ACTION ================= */
async function approve(id){
    const link = prompt("Masukkan link CBT:");
    if(!link) return;

    await post("update_order",{id, status_order:"disetujui", link_cbt:link}, token);
    loadData();
}

async function tolak(id){
    if(!confirm("Tolak data ini?")) return;

    await post("update_order",{id, status_order:"ditolak"}, token);
    loadData();
}

async function lunas(id){
    if(!confirm("Tandai lunas?")) return;

    await post("update_order",{id, status_bayar:"lunas"}, token);
    loadData();
}

/* ================= EVENT ================= */
document.getElementById("search").addEventListener("input", render);
document.getElementById("filterStatus").addEventListener("change", render);
document.getElementById("filterBayar").addEventListener("change", render);

/* ================= START ================= */
loadData();
</script>

</body>
</html>
