<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container py-5">

<h3>Dashboard Admin</h3>

<table class="table" id="table"></table>

<script src="../assets/app.js"></script>
<script>
const token = localStorage.token;

get("pendaftaran").then(res => {
  let html = "<tr><th>ID</th><th>Nama</th><th>Status</th><th>Aksi</th></tr>";

  res.data.slice(1).forEach(r => {
    html += `<tr>
      <td>${r[0]}</td>
      <td>${r[3]}</td>
      <td>${r[14]}</td>
      <td>
        <button onclick="approve('${r[0]}')">Approve</button>
      </td>
    </tr>`;
  });

  table.innerHTML = html;
});

function approve(id){
  const link = prompt("Masukkan link CBT");

  post("approve", {id:id, link_cbt:link}, token)
    .then(() => alert("Disetujui"));
}
</script>

</body>
</html>
