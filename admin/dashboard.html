<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin CBT</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="icon" href="data:,">

<style>
body { font-family: 'Inter', sans-serif; }

.card {
    border-radius: 16px;
    padding: 18px;
    color: white;
    position: relative;
}
.card .icon {
    position: absolute;
    right: 10px;
    bottom: 10px;
    opacity: 0.2;
    transform: scale(2.5);
}

.card-blue { background: linear-gradient(135deg,#3b82f6,#1e3a8a); }
.card-yellow { background: linear-gradient(135deg,#f59e0b,#b45309); }
.card-green { background: linear-gradient(135deg,#10b981,#065f46); }
.card-purple { background: linear-gradient(135deg,#8b5cf6,#4c1d95); }

.badge {
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: bold;
}

.skeleton {
    animation: pulse 1.5s infinite;
    background: #e5e7eb;
    border-radius: 6px;
}
@keyframes pulse {
    0%{opacity:1} 50%{opacity:.5} 100%{opacity:1}
}
</style>
</head>

<body class="bg-slate-100 p-6">

<script src="../assets/app.js"></script>

<!-- NAVBAR -->
<div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">Dashboard CBT</h1>
    <div class="flex gap-2">
        <button onclick="exportExcel()" class="bg-green-600 text-white px-3 py-2 rounded">Excel</button>
        <button onclick="window.print()" class="bg-purple-600 text-white px-3 py-2 rounded">PDF</button>
        <button onclick="logout()" class="bg-red-600 text-white px-3 py-2 rounded">Logout</button>
    </div>
</div>

<!-- STATS -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
    <div class="card card-blue"><div>Total</div><div id="total" class="text-3xl font-bold">0</div><i data-lucide="users" class="icon"></i></div>
    <div class="card card-yellow"><div>Pending</div><div id="pending" class="text-3xl font-bold">0</div><i data-lucide="clock" class="icon"></i></div>
    <div class="card card-green"><div>Disetujui</div><div id="approved" class="text-3xl font-bold">0</div><i data-lucide="check-circle" class="icon"></i></div>
    <div class="card card-purple"><div>Lunas</div><div id="paid" class="text-3xl font-bold">0</div><i data-lucide="credit-card" class="icon"></i></div>
</div>

<!-- FILTER -->
<div class="bg-white p-4 rounded shadow mb-4 flex gap-3 flex-wrap">
    <input id="search" class="border p-2 rounded" placeholder="Cari nama / ID...">
</div>

<!-- TABLE -->
<div class="bg-white rounded shadow overflow-auto">
<table class="w-full text-sm">
<thead class="bg-slate-900 text-white">
<tr>
<th class="p-3">ID</th>
<th class="p-3">Madrasah</th>
<th class="p-3">HP</th>
<th class="p-3">Status</th>
<th class="p-3">Bayar</th>
<th class="p-3">Bukti</th>
<th class="p-3">Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<!-- PAGINATION -->
<div class="mt-4 flex justify-between">
    <button onclick="prevPage()" class="bg-gray-300 px-3 py-1 rounded">Prev</button>
    <button onclick="nextPage()" class="bg-gray-300 px-3 py-1 rounded">Next</button>
</div>

<script>
const token = localStorage.getItem("token");
if(!token) location="login.html";

const user = JSON.parse(localStorage.getItem("user")||"{}");

let allData=[];
let page=1;
let limit=10;

/* ================= FIX GOOGLE DRIVE ================= */
function fixDriveUrl(url){
    if(!url) return "";
    if(url.includes("drive.google.com")){
        const id = url.match(/[-\\w]{25,}/);
        if(id) return `https://drive.google.com/uc?export=view&id=${id[0]}`;
    }
    return url;
}

/* ================= LOAD DATA ================= */
async function loadData(){
    const tbody = document.getElementById("tbody");

    tbody.innerHTML = `<tr><td colspan="7" class="p-6"><div class="skeleton h-6 w-full"></div></td></tr>`;

    try{
        const res = await get("pendaftaran");

        console.log("DEBUG:", res);

        if(!res || res.status !== "success"){
            throw new Error(res?.message || "Gagal ambil data");
        }

        if(!Array.isArray(res.data)){
            throw new Error("Format data salah");
        }

        allData = res.data.slice(1);
        render();

    }catch(err){
        tbody.innerHTML = `<tr><td colspan="7" class="text-red-600 text-center p-6">${err.message}</td></tr>`;
    }
}

/* ================= RENDER ================= */
function render(){
    const tbody = document.getElementById("tbody");
    const search = document.getElementById("search").value.toLowerCase();

    let start=(page-1)*limit;
    let data=allData.slice(start,start+limit);

    let html="";
    let stats={total:0,pending:0,approved:0,paid:0};

    data.forEach(r=>{
        if(!r) return;

        const id=r[0];
        const nama=r[3]||"-";
        const hp=r[9]||"-";
        const status=(r[14]||"pending").toLowerCase();
        const bayar=(r[15]||"belum_bayar").toLowerCase();
        const bukti=r[r.length-1];

        if(search && !(`${id} ${nama}`.toLowerCase().includes(search))) return;

        stats.total++;
        if(status==="pending")stats.pending++;
        if(status==="disetujui")stats.approved++;
        if(bayar==="lunas")stats.paid++;

        html+=`
        <tr class="border">
            <td class="p-2">${id}</td>
            <td class="p-2">${nama}</td>
            <td class="p-2">${hp}</td>
            <td class="p-2"><span class="badge bg-yellow-100">${status}</span></td>
            <td class="p-2"><span class="badge bg-green-100">${bayar}</span></td>
            <td class="p-2">
                ${bukti
                    ? `<img src="${fixDriveUrl(bukti)}"
                        class="w-12 h-12 object-cover rounded border cursor-pointer"
                        onclick="window.open('${fixDriveUrl(bukti)}')">`
                    : "-"
                }
            </td>
            <td class="p-2 flex gap-1">
                ${user?.role==="admin" ? `
                    <button onclick="approve('${id}')" class="bg-green-600 text-white px-2 rounded">✔</button>
                    <button onclick="lunas('${id}')" class="bg-blue-600 text-white px-2 rounded">💳</button>
                    <button onclick="tolak('${id}')" class="bg-red-600 text-white px-2 rounded">✖</button>
                ` : '-'}
            </td>
        </tr>`;
    });

    tbody.innerHTML = html || `<tr><td colspan="7" class="text-center p-6">Tidak ada data</td></tr>`;

    document.getElementById("total").innerText = allData.length;
    document.getElementById("pending").innerText = stats.pending;
    document.getElementById("approved").innerText = stats.approved;
    document.getElementById("paid").innerText = stats.paid;

    lucide.createIcons();
}

/* ================= ACTION ================= */
async function approve(id){
    await post("update_order",{id, status_order:"disetujui"}, token);
    loadData();
}

async function tolak(id){
    await post("update_order",{id, status_order:"ditolak"}, token);
    loadData();
}

async function lunas(id){
    await post("update_order",{id, status_bayar:"lunas"}, token);
    loadData();
}

/* ================= PAGINATION ================= */
function nextPage(){page++;render();}
function prevPage(){if(page>1)page--;render();}

/* ================= EXPORT ================= */
function exportExcel(){
    let csv="ID,Nama,HP\n";
    allData.forEach(r=>{
        csv+=`${r[0]},${r[3]},${r[9]}\n`;
    });

    const blob=new Blob([csv]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="data.csv";
    a.click();
}

/* ================= LOGOUT ================= */
function logout(){
    localStorage.clear();
    location="login.html";
}

/* ================= INIT ================= */
window.onload=()=>{
    loadData();
    document.getElementById("search").oninput=render;
};
</script>

</body>
</html>
