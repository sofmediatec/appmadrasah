<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin CBT</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
}
.glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
.card { border-radius:24px;padding:24px;color:#fff;transition:.3s }
.card:hover{transform:translateY(-6px)}
.card-blue{background:linear-gradient(135deg,#2563eb,#1d4ed8)}
.card-yellow{background:linear-gradient(135deg,#d97706,#b45309)}
.card-green{background:linear-gradient(135deg,#059669,#064e3b)}
.card-purple{background:linear-gradient(135deg,#7c3aed,#5b21b6)}
.badge{padding:6px 12px;border-radius:10px;font-size:11px;font-weight:700}
</style>
</head>

<body class="min-h-screen text-slate-800">

<header class="p-4 bg-white shadow flex justify-between">
<h1 class="font-bold text-xl">Dashboard Admin CBT</h1>
<div class="space-x-2">
<button onclick="exportExcel()">Excel</button>
<button onclick="window.print()">PDF</button>
<button onclick="logout()">Logout</button>
</div>
</header>

<main class="p-6 space-y-6">

<!-- STATS -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4">
<div class="card card-blue"><h2 id="total">0</h2>Total</div>
<div class="card card-yellow"><h2 id="pending">0</h2>Pending</div>
<div class="card card-green"><h2 id="approved">0</h2>Disetujui</div>
<div class="card card-purple"><h2 id="paid">0</h2>Lunas</div>
</div>

<!-- FILTER -->
<div class="flex gap-2">
<input id="search" placeholder="Cari..." class="border p-2 flex-1">
<select id="filterStatus" class="border p-2">
<option value="">Semua</option>
<option value="pending">Pending</option>
<option value="disetujui">Disetujui</option>
<option value="ditolak">Ditolak</option>
<option value="lunas">Lunas</option>
</select>

<select id="perPage" class="border p-2">
<option value="10">10</option>
<option value="25" selected>25</option>
<option value="50">50</option>
</select>
</div>

<!-- TABLE -->
<table class="w-full border">
<thead>
<tr>
<th>ID</th>
<th>Nama</th>
<th>Status</th>
<th>Bayar</th>
<th>Bukti</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div id="pagination" class="mt-4 flex gap-1"></div>

</main>

<script src="../assets/app.js"></script>
<script>
let currentPage = 1;
let perPage = 25;
let allData = [];
let selectedId = null;

const token = localStorage.getItem("token");
if(!token) location="login.html";

function fixDriveUrl(url){
if(!url) return "";
let id="";
if(url.includes("/file/d/")){
id=url.split("/file/d/")[1].split("/")[0];
}else if(url.includes("id=")){
id=url.split("id=")[1].split("&")[0];
}
return id?`https://drive.google.com/thumbnail?id=${id}`:"";
}

async function loadData(){
const res = await get("dashboard");
if(res.status==="success"){
allData = res.data || [];
render();
}
}

function getStatusColor(s){
s = (s||"").toLowerCase();
if(s==="lunas"||s==="disetujui") return "bg-green-200";
if(s==="pending") return "bg-yellow-200";
if(s==="ditolak") return "bg-red-200";
return "bg-gray-200";
}

function render(){
const search = document.getElementById("search").value.toLowerCase();
const filter = document.getElementById("filterStatus").value;

let filtered = allData.filter(r=>{
let cocok = `${r.id} ${r.nama_madrasah} ${r.no_hp}`.toLowerCase().includes(search);
if(!cocok) return false;

if(filter==="lunas") return r.status_pembayaran==="lunas";
if(filter) return r.status_order===filter;

return true;
});

let stats={pending:0,approved:0,paid:0};

filtered.forEach(r=>{
if(r.status_order==="pending") stats.pending++;
if(r.status_order==="disetujui") stats.approved++;
if(r.status_pembayaran==="lunas") stats.paid++;
});

document.getElementById("total").innerText=filtered.length;
document.getElementById("pending").innerText=stats.pending;
document.getElementById("approved").innerText=stats.approved;
document.getElementById("paid").innerText=stats.paid;

const totalPage = Math.ceil(filtered.length/perPage)||1;
if(currentPage>totalPage) currentPage=1;

let start=(currentPage-1)*perPage;
let pageData = filtered.slice(start,start+perPage);

let html="";
pageData.forEach(r=>{
html+=`
<tr>
<td>${r.id}</td>
<td>${r.nama_madrasah}</td>
<td><span class="${getStatusColor(r.status_order)}">${r.status_order}</span></td>
<td><span class="${getStatusColor(r.status_pembayaran)}">${r.status_pembayaran}</span></td>
<td>${r.bukti_url?`<img src="${fixDriveUrl(r.bukti_url)}" width="40">`:"-"}</td>
<td>
<button onclick="openVerifikasi('${r.id}')">Verif</button>
</td>
</tr>`;
});

document.getElementById("tbody").innerHTML = html;

renderPagination(totalPage);
}

function renderPagination(total){
let html="";
html+=`<button onclick="changePage(${currentPage-1})">‹</button>`;
for(let i=1;i<=total;i++){
html+=`<button onclick="changePage(${i})">${i}</button>`;
}
html+=`<button onclick="changePage(${currentPage+1})">›</button>`;
document.getElementById("pagination").innerHTML=html;
}

function changePage(p){
const total = Math.ceil(allData.length/perPage);
if(p<1||p>total) return;
currentPage=p;
render();
}

function openVerifikasi(id){
selectedId=id;
alert("Verifikasi ID: "+id);
}

async function saveDetail(){
await post("updateStatus",{id:selectedId},token);
loadData();
}

function exportExcel(){
let csv="ID,Nama\n";
allData.forEach(r=>{
csv+=`${r.id},${r.nama_madrasah}\n`;
});
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="data.csv";
a.click();
}

function logout(){
localStorage.clear();
location="login.html";
}

window.onload=()=>{
loadData();

search.oninput=()=>{currentPage=1;render();}
filterStatus.onchange=()=>{currentPage=1;render();}
perPage.onchange=e=>{
perPage=parseInt(e.target.value);
currentPage=1;
render();
};
};
</script>

</body>
</html>
