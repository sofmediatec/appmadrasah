<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin CBT</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body { font-family: 'Inter', sans-serif; background:#f1f5f9; }
.badge { @apply px-3 py-1 rounded-full text-[10px] font-bold border; }
.btn-action { @apply p-2 rounded-lg text-white text-xs; }
</style>
</head>

<body class="p-6">

<h1 class="text-2xl font-bold mb-6">Dashboard Admin CBT</h1>

<!-- STATS -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
<div>Total: <b id="total">0</b></div>
<div>Pending: <b id="pending">0</b></div>
<div>Disetujui: <b id="approved">0</b></div>
<div>Lunas: <b id="paid">0</b></div>
</div>

<!-- FILTER -->
<div class="flex gap-2 mb-4">
<input id="search" placeholder="Cari..." class="border p-2 rounded">
<select id="filterStatus" class="border p-2 rounded">
<option value="">Semua Status</option>
<option value="pending">Pending</option>
<option value="disetujui">Disetujui</option>
<option value="ditolak">Ditolak</option>
</select>
<select id="filterBayar" class="border p-2 rounded">
<option value="">Semua Bayar</option>
<option value="lunas">Lunas</option>
<option value="menunggu_verifikasi">Menunggu</option>
<option value="ditolak">Ditolak</option>
</select>
<button onclick="loadData()" class="bg-blue-600 text-white px-4 rounded">Refresh</button>
</div>

<!-- TABLE -->
<table class="w-full border">
<thead class="bg-slate-800 text-white">
<tr>
<th>ID</th>
<th>Nama</th>
<th>HP</th>
<th>Status</th>
<th>Pembayaran</th>
<th>Link</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tbody">
<tr><td colspan="7" class="text-center p-6">Loading...</td></tr>
</tbody>
</table>

<script src="../assets/app.js"></script>

<script>
const token = localStorage.getItem("token");
if(!token) location="login.html";

let allData = [];

async function loadData(){
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = `<tr><td colspan="7" class="text-center p-6">Loading...</td></tr>`;

    try{
        const res = await get("pendaftaran");

        console.log("DEBUG API:", res);

        if(!res || res.status !== "success" || !Array.isArray(res.data)){
            throw new Error("Data tidak valid dari server");
        }

        if(res.data.length <= 1){
            tbody.innerHTML = `<tr><td colspan="7">Tidak ada data</td></tr>`;
            return;
        }

        allData = res.data.slice(1); // skip header
        render();

    }catch(err){
        tbody.innerHTML = `<tr><td colspan="7" class="text-red-600">${err.message}</td></tr>`;
    }
}

function render(){
    const tbody = document.getElementById("tbody");
    const search = document.getElementById("search").value.toLowerCase();
    const fStatus = document.getElementById("filterStatus").value;
    const fBayar = document.getElementById("filterBayar").value;

    let html = "";
    let total=0, pending=0, approved=0, paid=0;

    allData.forEach(r => {

        if(!r || r.length < 5) return;

        const id = r[0] || "-";
        const nama = r[3] || "-";
        const hp = r[9] || "-";

        const status = (r[14] || "pending").toLowerCase();
        const bayar = (r[15] || "belum_bayar").toLowerCase();
        const link = r[16];

        // FILTER
        if(search && !(`${id} ${nama}`.toLowerCase().includes(search))) return;
        if(fStatus && status !== fStatus) return;
        if(fBayar && bayar !== fBayar) return;

        total++;
        if(status==="pending") pending++;
        if(status==="disetujui") approved++;
        if(bayar==="lunas") paid++;

        html += `
        <tr class="border">
        <td>${id}</td>
        <td>${nama}</td>
        <td>${hp}</td>

        <td><span class="badge bg-yellow-100">${status}</span></td>
        <td><span class="badge bg-green-100">${bayar}</span></td>

        <td>
        ${link ? `<a href="${link}" target="_blank">Buka</a>` : "-"}
        </td>

        <td class="flex gap-1">
        <button onclick="approve('${id}')" class="btn-action bg-green-600">✔</button>
        <button onclick="lunas('${id}')" class="btn-action bg-blue-600">💳</button>
        <button onclick="tolak('${id}')" class="btn-action bg-red-600">✖</button>
        </td>
        </tr>`;
    });

    tbody.innerHTML = html || `<tr><td colspan="7">Tidak ada data</td></tr>`;

    document.getElementById("total").innerText = total;
    document.getElementById("pending").innerText = pending;
    document.getElementById("approved").innerText = approved;
    document.getElementById("paid").innerText = paid;
}

/* ================= ACTION ================= */

async function approve(id){
    await post("update_order",{id, status_order:"disetujui"}, token);
    loadData();
}

async function tolak(id){
    await post("update_order",{id, status_order:"ditolak"}, token);
    loadData();
}

async function lunas(id){
    await post("update_pembayaran",{pendaftaran_id:id, status:"lunas"}, token);
    loadData();
}

/* ================= FILTER ================= */

document.getElementById("search").oninput = render;
document.getElementById("filterStatus").onchange = render;
document.getElementById("filterBayar").onchange = render;

loadData();
</script>

</body>
</html>
