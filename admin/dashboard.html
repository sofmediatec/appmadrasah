<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin | CBT Madrasah</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<!-- Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body{
    font-family: 'Inter', sans-serif;
    background:#f1f5f9;
}

.custom-scrollbar::-webkit-scrollbar{width:6px;height:6px;}
.custom-scrollbar::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px;}

/* badge manual (FIX tailwind @apply error) */
.badge{
    display:inline-block;
    padding:4px 10px;
    font-size:10px;
    font-weight:900;
    border-radius:999px;
    text-transform:uppercase;
    border:1px solid;
}

/* button action */
.btn-action{
    padding:8px;
    border-radius:10px;
    transition:.2s;
}
.btn-action:hover{transform:scale(1.05);}
</style>
</head>

<body class="min-h-screen pb-10">

<!-- NAV -->
<nav class="bg-white border-b shadow-sm sticky top-0 z-40">
<div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">

<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white">
<i data-lucide="layout-dashboard"></i>
</div>
<div>
<div class="font-black">Admin Panel</div>
<div class="text-[10px] text-blue-600 font-bold">CBT MADRASAH</div>
</div>
</div>

<button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded-xl text-xs font-black">
Logout
</button>

</div>
</nav>

<!-- STATS -->
<div class="max-w-7xl mx-auto px-6 mt-8 grid grid-cols-2 md:grid-cols-4 gap-4">

<div class="bg-white p-5 rounded-2xl border">
<div class="text-xs font-bold text-blue-600">TOTAL</div>
<div id="total" class="text-3xl font-black">0</div>
</div>

<div class="bg-white p-5 rounded-2xl border">
<div class="text-xs font-bold text-amber-600">PENDING</div>
<div id="pending" class="text-3xl font-black">0</div>
</div>

<div class="bg-white p-5 rounded-2xl border">
<div class="text-xs font-bold text-green-600">DISETUJUI</div>
<div id="approved" class="text-3xl font-black">0</div>
</div>

<div class="bg-white p-5 rounded-2xl border">
<div class="text-xs font-bold text-purple-600">LUNAS</div>
<div id="paid" class="text-3xl font-black">0</div>
</div>

</div>

<!-- TABLE -->
<div class="max-w-7xl mx-auto px-6 mt-6">

<div class="bg-white rounded-2xl border overflow-hidden">

<div class="p-4 border-b flex gap-3 flex-wrap">
<input id="search" class="border px-3 py-2 rounded-xl text-sm" placeholder="Cari...">

<select id="filterStatus" class="border px-3 py-2 rounded-xl text-sm">
<option value="">Status</option>
<option value="pending">Pending</option>
<option value="disetujui">Disetujui</option>
<option value="ditolak">Ditolak</option>
</select>

<select id="filterBayar" class="border px-3 py-2 rounded-xl text-sm">
<option value="">Pembayaran</option>
<option value="lunas">Lunas</option>
<option value="menunggu_verifikasi">Menunggu</option>
<option value="ditolak">Ditolak</option>
</select>

<button onclick="loadData()" class="bg-blue-600 text-white px-4 rounded-xl text-sm">
Refresh
</button>

</div>

<div class="overflow-x-auto custom-scrollbar">
<table class="w-full text-sm">
<thead class="bg-slate-900 text-white text-xs uppercase">
<tr>
<th class="p-3">ID</th>
<th>Nama</th>
<th>HP</th>
<th>Status</th>
<th>Bayar</th>
<th>Link</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tbody">
<tr><td colspan="7" class="text-center p-6">Loading...</td></tr>
</tbody>

</table>
</div>

</div>
</div>

<script src="assets/app.js"></script>

<script>
lucide.createIcons();

const token = localStorage.getItem("token");
if(!token) location="login.html";

let allData = [];

async function loadData(){
    const res = await get("pendaftaran");

    if(!res || res.status !== "success"){
        alert("Gagal load data");
        return;
    }

    allData = res.data.slice(1);
    render();
}

function render(){

let tbody = document.getElementById("tbody");
let search = document.getElementById("search").value.toLowerCase();
let fStatus = document.getElementById("filterStatus").value;
let fBayar = document.getElementById("filterBayar").value;

let html = "";

let total=0, pending=0, approved=0, paid=0;

allData.forEach(r => {

let id = r[0];
let nama = r[3] || "-";
let hp = r[9] || "-";
let status = (r[14]||"pending").toLowerCase();
let bayar = (r[15]||"belum_bayar").toLowerCase();
let link = r[16];

if(search && !(nama+id).toLowerCase().includes(search)) return;
if(fStatus && status !== fStatus) return;
if(fBayar && bayar !== fBayar) return;

total++;
if(status==="pending") pending++;
if(status==="disetujui") approved++;
if(bayar==="lunas") paid++;

let sClass = {
pending:"bg-amber-100 text-amber-800 border-amber-200",
disetujui:"bg-green-100 text-green-800 border-green-200",
ditolak:"bg-red-100 text-red-800 border-red-200"
};

let bClass = {
lunas:"bg-blue-100 text-blue-800 border-blue-200",
menunggu_verifikasi:"bg-amber-100 text-amber-800 border-amber-200",
ditolak:"bg-red-100 text-red-800 border-red-200",
belum_bayar:"bg-slate-100 text-slate-600 border-slate-200"
};

html += `
<tr class="border-b">
<td class="p-3">#${id}</td>
<td>${nama}</td>
<td>${hp}</td>

<td><span class="badge ${sClass[status]||""}">${status}</span></td>
<td><span class="badge ${bClass[bayar]||""}">${bayar}</span></td>

<td>${link ? `<a class="text-blue-600" target="_blank" href="${link}">Buka</a>` : "-"}</td>

<td class="flex gap-2 p-2">
<button onclick="approve('${id}')" class="btn-action bg-green-600 text-white">✔</button>
<button onclick="lunas('${id}')" class="btn-action bg-blue-600 text-white">💳</button>
<button onclick="tolak('${id}')" class="btn-action bg-red-600 text-white">✖</button>
</td>
</tr>
`;
});

tbody.innerHTML = html;

document.getElementById("total").innerText = total;
document.getElementById("pending").innerText = pending;
document.getElementById("approved").innerText = approved;
document.getElementById("paid").innerText = paid;

lucide.createIcons();
}

/* ACTION */
async function approve(id){
await post("update_order",{id,status_order:"disetujui"},token);
loadData();
}

async function tolak(id){
await post("update_order",{id,status_order:"ditolak"},token);
loadData();
}

async function lunas(id){
await post("update_order",{id,status_bayar:"lunas"},token);
loadData();
}

function logout(){
localStorage.clear();
location="login.html";
}

document.getElementById("search").oninput = render;
document.getElementById("filterStatus").onchange = render;
document.getElementById("filterBayar").onchange = render;

loadData();
</script>

</body>
</html>
