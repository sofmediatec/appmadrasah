<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin CBT</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- GANTI HANYA BAGIAN <style> SAJA -->
<style>
    body { 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
        background-attachment: fixed;
        min-height: 100vh;
    }

    .glass {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 1);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    }

    .card {
        border-radius: 24px;
        padding: 24px;
        color: white;
        position: relative;
        overflow: hidden;
        transition: 0.3s;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
    }
    
    .card:hover {
        transform: translateY(-8px);
    }

    .card::after {
        content: "";
        position: absolute;
        top: -10%;
        right: -10%;
        width: 120px;
        height: 120px;
        background: rgba(255,255,255,0.2);
        border-radius: 50%;
    }

    .card-blue { background: linear-gradient(135deg,#2563eb,#1d4ed8); }
    .card-yellow { background: linear-gradient(135deg,#d97706,#b45309); }
    .card-green { background: linear-gradient(135deg,#059669,#064e3b); }
    .card-purple { background: linear-gradient(135deg,#7c3aed,#5b21b6); }

    /* 🔥 PENTING: SAMAKAN DENGAN JS */
    .badge {
        padding: 6px 14px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        display: inline-block;
    }

    .custom-scroll::-webkit-scrollbar { height:6px;width:6px }
    .custom-scroll::-webkit-scrollbar-thumb { background:#94a3b8;border-radius:10px }

    .fade-in { animation: fadeIn .4s ease-out; }
    @keyframes fadeIn{
        from{opacity:0;transform:translateY(15px)}
        to{opacity:1;transform:translateY(0)}
    }

    thead th {
        background:#0f172a;
        color:#fff;
        font-weight:700;
    }
</style>
</head>

<body class="min-h-screen text-slate-800">
    <header class="p-6 md:px-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">Dashboard Admin</h1>
            <p class="text-slate-500 font-medium">Manajemen Pendaftaran CBT Madrasah</p>
        </div>
        <div class="flex items-center gap-3 w-full md:w-auto">
            <button onclick="exportExcel()" class="flex-1 md:flex-none bg-white border border-slate-200 text-slate-700 px-5 py-2.5 rounded-2xl font-bold shadow-sm hover:bg-slate-50 transition-all flex items-center justify-center gap-2">
                <i class="fas fa-file-excel text-emerald-600"></i> Excel
            </button>
            <button onclick="window.print()" class="flex-1 md:flex-none bg-white border border-slate-200 text-slate-700 px-5 py-2.5 rounded-2xl font-bold shadow-sm hover:bg-slate-50 transition-all flex items-center justify-center gap-2">
                <i class="fas fa-file-pdf text-rose-600"></i> PDF
            </button>
            <button onclick="logout()" class="flex-1 md:flex-none bg-slate-900 text-white px-5 py-2.5 rounded-2xl font-bold shadow-lg hover:bg-slate-800 transition-all flex items-center justify-center gap-2">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </header>

    <main class="p-6 md:px-10 space-y-8">
        
        <!-- STATS CARDS -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="card card-blue shadow-blue-100">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm font-bold opacity-80 uppercase tracking-wider">Total Pendaftar</p>
                        <h2 id="total" class="text-4xl font-black mt-1">0</h2>
                    </div>
                    <div class="bg-white/20 p-3 rounded-2xl"><i class="fas fa-users text-2xl"></i></div>
                </div>
            </div>

            <div class="card card-yellow shadow-yellow-100">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm font-bold opacity-80 uppercase tracking-wider">Menunggu</p>
                        <h2 id="pending" class="text-4xl font-black mt-1">0</h2>
                    </div>
                    <div class="bg-white/20 p-3 rounded-2xl"><i class="fas fa-clock text-2xl"></i></div>
                </div>
            </div>

            <div class="card card-green shadow-emerald-100">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm font-bold opacity-80 uppercase tracking-wider">Disetujui</p>
                        <h2 id="approved" class="text-4xl font-black mt-1">0</h2>
                    </div>
                    <div class="bg-white/20 p-3 rounded-2xl"><i class="fas fa-check-double text-2xl"></i></div>
                </div>
            </div>

            <div class="card card-purple shadow-purple-100">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm font-bold opacity-80 uppercase tracking-wider">Lunas</p>
                        <h2 id="paid" class="text-4xl font-black mt-1">0</h2>
                    </div>
                    <div class="bg-white/20 p-3 rounded-2xl"><i class="fas fa-wallet text-2xl"></i></div>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <div class="glass p-2 rounded-3xl shadow-sm flex items-center px-6 focus-within:ring-2 focus-within:ring-blue-500 transition-all">
                <i class="fas fa-search text-slate-400 mr-4"></i>
                <input id="search" class="bg-transparent border-none py-4 w-full outline-none text-slate-700 font-medium" placeholder="Cari berdasarkan nama madrasah atau ID pendaftaran...">
            </div>

            <div class="glass rounded-[2rem] shadow-sm overflow-hidden border border-slate-200">
                <div class="overflow-x-auto custom-scroll">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200">
                                <th class="p-5 text-xs font-bold text-slate-500 uppercase tracking-widest">ID</th>
                                <th class="p-5 text-xs font-bold text-slate-500 uppercase tracking-widest">Madrasah</th>
                                <th class="p-5 text-xs font-bold text-slate-500 uppercase tracking-widest">Status Order</th>
                                <th class="p-5 text-xs font-bold text-slate-500 uppercase tracking-widest">Pembayaran</th>
                                <th class="p-5 text-xs font-bold text-slate-500 uppercase tracking-widest text-center">Bukti</th>
                                <th class="p-5 text-xs font-bold text-slate-500 uppercase tracking-widest text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tbody" class="divide-y divide-slate-100">
                            <!-- Data will be injected here -->
                        </tbody>
                    </table>
                </div>
                <div id="emptyState" class="hidden p-20 text-center">
                    <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-400">
                        <i class="fas fa-folder-open text-3xl"></i>
                    </div>
                    <h3 class="text-lg font-bold text-slate-600">Tidak ada data ditemukan</h3>
                    <p class="text-slate-400">Coba gunakan kata kunci pencarian yang lain.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- MODAL DETAIL -->
    <div id="modalDetail" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-[60] p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-2xl p-8 shadow-2xl fade-in max-h-[90vh] overflow-y-auto custom-scroll">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-extrabold text-slate-900">Detail Lengkap</h2>
                <button onclick="closeDetail()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 hover:bg-slate-200 transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="detailContent" class="space-y-2"></div>
        </div>
    </div>

    <!-- MODAL VERIFIKASI -->
    <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-[70] p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-8 shadow-2xl fade-in">
            <h2 class="text-2xl font-extrabold text-slate-900 mb-1">Verifikasi</h2>
            <p class="text-slate-500 text-sm mb-6">Update status pendaftaran ID: <span id="dId" class="font-bold text-blue-600"></span></p>

            <div class="space-y-5">
                <div id="buktiWrap">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Bukti Transfer</label>
                    <img id="dBukti" onclick="window.open(this.src)" class="w-full h-48 object-cover rounded-2xl border-2 border-slate-100 cursor-pointer hover:opacity-90 transition-opacity">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Status Pesanan</label>
                    <select id="dStatus" class="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="pending">⏳ Pending (Menunggu)</option>
                        <option value="disetujui">✅ Disetujui</option>
                        <option value="ditolak">❌ Ditolak</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Status Pembayaran</label>
                    <select id="dBayar" class="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="belum_bayar">❌ Belum Bayar</option>
                        <option value="menunggu_verifikasi">⏳ Menunggu Verifikasi</option>
                        <option value="lunas">💰 Lunas / Terbayar</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Link Aplikasi CBT</label>
                    <input id="dLink" class="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="https://cbt.sekolah.sch.id">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mt-8">
                <button onclick="closeModal()" class="py-3.5 rounded-2xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">Batal</button>
                <button onclick="saveDetail()" class="py-3.5 rounded-2xl font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">Simpan Perubahan</button>
            </div>
        </div>
    </div>

    <script src="../assets/app.js"></script>
    <script>
        const token = localStorage.getItem("token");
        if(!token) location="login.html";

        let allData = [];
        let selectedId = null;

        // Mock functions for demonstration if app.js is missing
        const get = window.get || (async () => ({status: "error", message: "app.js get() not found"}));
        const post = window.post || (async () => ({status: "error", message: "app.js post() not found"}));

        function fixDriveUrl(url) {
            if(!url) return "";
            let id = "";
            if(url.includes("/file/d/")) id = url.split("/file/d/")[1].split("/")[0];
            else if(url.includes("id=")) id = url.split("id=")[1].split("&")[0];
            return id ? `https://drive.google.com/thumbnail?id=${id}&sz=w400` : "";
        }

        async function loadData() {
            const tbody = document.getElementById("tbody");
            tbody.innerHTML = `<tr><td colspan="6" class="p-20 text-center"><i class="fas fa-spinner fa-spin text-3xl text-blue-500"></i><p class="mt-2 text-slate-400 font-medium">Memuat data...</p></td></tr>`;
            
            try {
                const res = await get("dashboard");
                if(res.status !== "success") throw new Error(res.message);
                allData = res.data || [];
                render();
            } catch(err) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-20 text-center text-red-500 font-bold"><i class="fas fa-exclamation-triangle mb-2"></i><br>${err.message}</td></tr>`;
            }
        }

        function getStatusColor(status) {
            status = status.toLowerCase();
            if(status === 'disetujui' || status === 'lunas') return 'bg-emerald-100 text-emerald-700';
            if(status === 'pending' || status === 'menunggu_verifikasi') return 'bg-amber-100 text-amber-700';
            if(status === 'ditolak') return 'bg-rose-100 text-rose-700';
            return 'bg-slate-100 text-slate-600';
        }

        function render() {
            const tbody = document.getElementById("tbody");
            const emptyState = document.getElementById("emptyState");
            const search = document.getElementById("search").value.toLowerCase();

            let html = "";
            let stats = { pending: 0, approved: 0, paid: 0 };
            let count = 0;

            allData.forEach(r => {
                const id = r.id;
                const nama = r.nama_madrasah || "-";
                const hp = r.no_hp || "-";
                const status = (r.status_order || "pending").toLowerCase();
                const bayar = (r.status_pembayaran || "belum_bayar").toLowerCase();
                const bukti = fixDriveUrl(r.bukti_url);

                if(search && !(`${id} ${nama} ${hp}`.toLowerCase().includes(search))) return;

                count++;
                if(status === "pending") stats.pending++;
                if(status === "disetujui") stats.approved++;
                if(bayar === "lunas") stats.paid++;

                html += `
                <tr class="hover:bg-slate-50/80 transition-colors group">
                    <td class="p-5 font-mono text-xs font-bold text-slate-400">#${id}</td>
                    <td class="p-5">
                        <div class="font-bold text-slate-800">${nama}</div>
                        <div class="text-xs text-slate-400 mt-0.5"><i class="fas fa-phone-alt mr-1"></i> ${hp}</div>
                    </td>
                    <td class="p-5">
                        <span class="status-badge ${getStatusColor(status)}">${status}</span>
                    </td>
                    <td class="p-5">
                        <span class="status-badge ${getStatusColor(bayar)}">${bayar.replace('_', ' ')}</span>
                    </td>
                    <td class="p-5 text-center">
                        ${bukti ? `<img src="${bukti}" class="w-10 h-10 object-cover rounded-lg border border-slate-200 mx-auto shadow-sm group-hover:scale-110 transition-transform cursor-pointer" onclick="openVerifikasi('${id}')">` : `<span class="text-slate-300">-</span>`}
                    </td>
                    <td class="p-5 text-right space-x-1">
                        <button onclick="openDetailView('${id}')" class="p-2.5 rounded-xl bg-slate-100 text-slate-600 hover:bg-slate-900 hover:text-white transition-all" title="Detail">
                            <i class="fas fa-eye text-sm"></i>
                        </button>
                        <button onclick="openVerifikasi('${id}')" class="p-2.5 rounded-xl bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white transition-all shadow-sm" title="Verifikasi">
                            <i class="fas fa-user-check text-sm"></i>
                        </button>
                    </td>
                </tr>`;
            });

            tbody.innerHTML = html;
            emptyState.classList.toggle("hidden", count > 0);

            // Update Stats with basic animation feel
            document.getElementById("total").innerText = allData.length;
            document.getElementById("pending").innerText = stats.pending;
            document.getElementById("approved").innerText = stats.approved;
            document.getElementById("paid").innerText = stats.paid;
        }

        function openDetailView(id) {
            const r = allData.find(x => x.id == id);
            if(!r) return;

            const fields = [
                { l: "ID Pendaftaran", v: r.id },
                { l: "Nama Madrasah", v: r.nama_madrasah },
                { l: "NPSN", v: r.npsn },
                { l: "Alamat", v: r.alamat },
                { l: "Kabupaten", v: r.kabupaten },
                { l: "Provinsi", v: r.provinsi },
                { l: "Penanggung Jawab", v: r.nama_penanggung_jawab },
                { l: "No. HP / WhatsApp", v: r.no_hp },
                { l: "Email", v: r.email },
                { l: "Jumlah Peserta", v: r.jumlah_peserta },
                { l: "Paket Layanan", v: r.paket_id },
                { l: "Total Biaya", v: `Rp ${Number(r.harga||0).toLocaleString()}`, highlight: true },
                { l: "Status Order", v: r.status_order, badge: true },
                { l: "Status Bayar", v: r.status_pembayaran, badge: true },
                { l: "Link CBT", v: r.link_cbt || "Belum diset" }
            ];

            let html = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;
            fields.forEach(f => {
                html += `
                <div class="p-4 rounded-2xl bg-slate-50 border border-slate-100">
                    <p class="text-[10px] uppercase font-bold text-slate-400 mb-1 tracking-widest">${f.l}</p>
                    <p class="font-bold ${f.highlight ? 'text-emerald-600' : 'text-slate-700'}">
                        ${f.badge ? `<span class="badge ${getStatusColor(f.v)}">${f.v}</span>` : (f.v || '-')}
                    </p>
                </div>`;
            });
            html += `</div>`;

            document.getElementById("detailContent").innerHTML = html;
            document.getElementById("modalDetail").classList.remove("hidden");
        }

        function closeDetail() { document.getElementById("modalDetail").classList.add("hidden"); }

        function openVerifikasi(id) {
            const r = allData.find(x => x.id == id);
            if(!r) return;

            selectedId = id;
            document.getElementById("dId").innerText = id;
            document.getElementById("dStatus").value = r.status_order || "pending";
            document.getElementById("dBayar").value = r.status_pembayaran || "belum_bayar";
            document.getElementById("dLink").value = r.link_cbt || "";

            const bukti = fixDriveUrl(r.bukti_url);
            const container = document.getElementById("buktiWrap");
            if(bukti) {
                document.getElementById("dBukti").src = bukti;
                container.classList.remove("hidden");
            } else {
                container.classList.add("hidden");
            }

            document.getElementById("modal").classList.remove("hidden");
        }

        function closeModal() { document.getElementById("modal").classList.add("hidden"); }

        async function saveDetail() {
            const btn = document.querySelector("#modal button[onclick='saveDetail()']");
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = "Menyimpan...";

            try {
                const res = await post("updateStatus", {
                    id: selectedId,
                    status_order: document.getElementById("dStatus").value,
                    status_bayar: document.getElementById("dBayar").value,
                    link_cbt: document.getElementById("dLink").value
                }, token);

                if(res.status === "success") {
                    closeModal();
                    loadData();
                } else {
                    throw new Error(res.message);
                }
            } catch(err) {
                alert("Gagal update: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        function exportExcel() {
            let csv = "\uFEFFID,Nama Madrasah,NPSN,HP,Email,Status Order,Status Bayar,Harga\n";
            allData.forEach(r => {
                csv += `"${r.id}","${r.nama_madrasah}","${r.npsn}","${r.no_hp}","${r.email}","${r.status_order}","${r.status_pembayaran}","${r.harga}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `Data_Pendaftaran_CBT_${new Date().toLocaleDateString()}.csv`;
            a.click();
        }

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("user");
            location = "login.html";
        }

        window.onload = () => {
            loadData();
            document.getElementById("search").oninput = render;
        };
    </script>
</body>
</html>
