<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin CBT</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; background:#f1f5f9; }
.card { @apply bg-white p-5 rounded-2xl shadow; }
</style>
</head>

<body class="p-6">

<h1 class="text-2xl font-bold mb-6">Dashboard Admin</h1>

<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
<div class="card text-center">Total<br><b id="total">0</b></div>
<div class="card text-center">Pending<br><b id="pending">0</b></div>
<div class="card text-center">Disetujui<br><b id="approved">0</b></div>
<div class="card text-center">Lunas<br><b id="paid">0</b></div>
</div>

<div class="card">
<input id="search" placeholder="Cari..." class="border p-2 rounded w-full mb-4">

<table class="w-full text-sm">
<thead>
<tr class="bg-gray-200">
<th>ID</th>
<th>Madrasah</th>
<th>HP</th>
<th>Status</th>
<th>Bayar</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script src="../assets/app.js"></script>

<script>
// ================= AUTH =================
const token = localStorage.getItem("token");
if(!token){
  alert("Silakan login dulu");
  location="login.html";
}

// ================= DATA =================
let allData = [];

// ================= LOAD =================
async function loadData(){
  try{

    console.log("Ambil data...");

    const res = await get("pendaftaran", token);

    console.log("Response:", res);

    if(!res || res.status !== "success"){
      throw new Error(res?.message || "Gagal ambil data");
    }

    if(!res.data){
      throw new Error("Data kosong dari server");
    }

    allData = res.data.slice(1);

    render();

  }catch(err){
    console.error(err);
    document.getElementById("tbody").innerHTML =
    `<tr><td colspan="6" class="text-red-600 text-center">${err.message}</td></tr>`;
  }
}

// ================= RENDER =================
function render(){

  const tbody = document.getElementById("tbody");
  const search = document.getElementById("search").value.toLowerCase();

  let html="";
  let total=0,pending=0,approved=0,paid=0;

  allData.forEach(r=>{

    const id = r[0];
    const nama = r[3]||"-";
    const hp = r[9]||"-";
    const status = (r[14]||"pending").toLowerCase();
    const bayar = (r[15]||"belum_bayar").toLowerCase();

    if(search && !(`${id} ${nama}`.toLowerCase().includes(search))) return;

    total++;
    if(status==="pending") pending++;
    if(status==="disetujui") approved++;
    if(bayar==="lunas") paid++;

    html += `
    <tr class="border-b">
      <td>${id}</td>
      <td>${nama}</td>
      <td>${hp}</td>
      <td>${status}</td>
      <td>${bayar}</td>
      <td class="space-x-2">

        <button onclick="approve('${id}')" class="bg-green-500 text-white px-2 rounded">✔</button>
        <button onclick="lunas('${id}')" class="bg-blue-500 text-white px-2 rounded">💳</button>
        <button onclick="tolak('${id}')" class="bg-red-500 text-white px-2 rounded">✖</button>

      </td>
    </tr>
    `;
  });

  tbody.innerHTML = html || `<tr><td colspan="6">Tidak ada data</td></tr>`;

  document.getElementById("total").innerText=total;
  document.getElementById("pending").innerText=pending;
  document.getElementById("approved").innerText=approved;
  document.getElementById("paid").innerText=paid;
}

// ================= ACTION =================
async function approve(id){
  await post("update_order",{id,status_order:"disetujui"},token);
  loadData();
}

async function lunas(id){
  await post("update_order",{id,status_bayar:"lunas"},token);
  loadData();
}

async function tolak(id){
  await post("update_order",{id,status_order:"ditolak"},token);
  loadData();
}

// ================= SEARCH =================
document.getElementById("search").oninput = render;

// ================= INIT =================
loadData();
</script>

</body>
</html>
