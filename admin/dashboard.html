<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin CBT</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    body { 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
        background-attachment: fixed;
        min-height: 100vh;
    }

    .glass {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(203, 213, 225, 1);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    }

    /* 🔥 HIGH CONTRAST TABLE STYLES */
    .table-container {
        border: 2px solid #1e293b;
    }

    thead th {
        background: #0f172a !important; /* Hitam Pekat */
        color: #ffffff !important;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border-bottom: 3px solid #334155;
    }

    /* Zebra Striping */
    tbody tr:nth-child(even) {
        background-color: #f1f5f9; /* Abu-abu muda untuk baris genap */
    }

    tbody tr:nth-child(odd) {
        background-color: #ffffff; /* Putih untuk baris ganjil */
    }

    /* Hover effect kontras tinggi */
    tbody tr:hover {
        background-color: #e2e8f0 !important;
        border-left: 5px solid #2563eb;
        cursor: default;
    }

    tbody td {
        border-bottom: 1px solid #cbd5e1; /* Border lebih gelap */
        color: #0f172a; /* Teks hitam pekat */
        font-weight: 600;
        padding: 1.25rem 1rem !important;
    }

    /* Card Stats Styles */
    .card {
        border-radius: 24px;
        padding: 24px;
        color: white;
        position: relative;
        overflow: hidden;
        transition: 0.3s;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
    }
    .card:hover { transform: translateY(-8px); }
    .card-blue { background: linear-gradient(135deg,#2563eb,#1d4ed8); }
    .card-yellow { background: linear-gradient(135deg,#d97706,#b45309); }
    .card-green { background: linear-gradient(135deg,#059669,#064e3b); }
    .card-purple { background: linear-gradient(135deg,#7c3aed,#5b21b6); }

    /* Badges with High Contrast */
    .badge {
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        display: inline-block;
        border: 1.5px solid currentColor;
    }

    .badge-emerald { background: #ecfdf5; color: #065f46; border-color: #059669; }
    .badge-amber { background: #fffbeb; color: #92400e; border-color: #d97706; }
    .badge-rose { background: #fff1f2; color: #9f1239; border-color: #e11d48; }
    .badge-slate { background: #f8fafc; color: #334155; border-color: #94a3b8; }

    .custom-scroll::-webkit-scrollbar { height:6px;width:6px }
    .custom-scroll::-webkit-scrollbar-thumb { background:#475569;border-radius:10px }

    .btn-pagination {
        transition: all 0.2s;
        padding: 8px 16px;
        border-radius: 12px;
        font-weight: 700;
        border: 2px solid #e2e8f0;
    }
    .btn-pagination:hover:not(:disabled) {
        border-color: #0f172a;
        background: #f8fafc;
    }
</style>
</head>

<body class="min-h-screen text-slate-800">
<header class="sticky top-0 z-50 backdrop-blur-lg bg-white/80 border-b border-slate-200 shadow-sm">
    <div class="p-4 md:px-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-slate-900">Dashboard Admin</h1>
            <p class="text-slate-500 text-sm font-medium">Manajemen Pendaftaran CBT Madrasah</p>
        </div>
        <div class="flex items-center gap-2 w-full md:w-auto">
            <button onclick="exportExcel()" class="flex-1 md:flex-none bg-white border-2 border-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold hover:bg-slate-50 transition flex items-center justify-center gap-2">
                <i class="fas fa-file-excel text-emerald-600"></i><span class="hidden md:inline">Excel</span>
            </button>
            <button onclick="window.print()" class="flex-1 md:flex-none bg-white border-2 border-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold hover:bg-slate-50 transition flex items-center justify-center gap-2">
                <i class="fas fa-file-pdf text-rose-600"></i><span class="hidden md:inline">PDF</span>
            </button>
            <button onclick="logout()" class="flex-1 md:flex-none bg-slate-900 text-white px-4 py-2 rounded-xl font-bold hover:bg-slate-800 transition flex items-center justify-center gap-2">
                <i class="fas fa-sign-out-alt"></i><span class="hidden md:inline">Logout</span>
            </button>
        </div>
    </div>
</header>

<main class="p-6 md:px-10 space-y-8">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <div class="card card-blue shadow-blue-100">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-sm font-bold opacity-80 uppercase tracking-wider">Total Pendaftar</p>
                    <h2 id="total" class="text-4xl font-black mt-1">0</h2>
                </div>
                <div class="bg-white/20 p-3 rounded-2xl"><i class="fas fa-users text-2xl"></i></div>
            </div>
        </div>
        <div class="card card-yellow shadow-yellow-100">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-sm font-bold opacity-80 uppercase tracking-wider">Menunggu</p>
                    <h2 id="pending" class="text-4xl font-black mt-1">0</h2>
                </div>
                <div class="bg-white/20 p-3 rounded-2xl"><i class="fas fa-clock text-2xl"></i></div>
            </div>
        </div>
        <div class="card card-green shadow-emerald-100">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-sm font-bold opacity-80 uppercase tracking-wider">Disetujui</p>
                    <h2 id="approved" class="text-4xl font-black mt-1">0</h2>
                </div>
                <div class="bg-white/20 p-3 rounded-2xl"><i class="fas fa-check-double text-2xl"></i></div>
            </div>
        </div>
        <div class="card card-purple shadow-purple-100">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-sm font-bold opacity-80 uppercase tracking-wider">Lunas</p>
                    <h2 id="paid" class="text-4xl font-black mt-1">0</h2>
                </div>
                <div class="bg-white/20 p-3 rounded-2xl"><i class="fas fa-wallet text-2xl"></i></div>
            </div>
        </div>
    </div>

    <div class="space-y-4">
        <div class="flex flex-col md:flex-row gap-3">
            <div class="glass p-2 rounded-3xl shadow-sm flex items-center px-6 flex-1">
                <i class="fas fa-search text-slate-500 mr-4"></i>
                <input id="search" class="bg-transparent border-none py-4 w-full outline-none text-slate-900 font-bold" placeholder="Cari nama atau ID...">
            </div>
            
            <div class="flex gap-2">
                <select id="filterStatus" class="glass px-5 py-4 rounded-2xl font-bold text-slate-900 border-2 border-slate-300 outline-none">
                    <option value="">Semua Status</option>
                    <option value="pending">⏳ Pending</option>
                    <option value="disetujui">✅ Disetujui</option>
                    <option value="ditolak">❌ Ditolak</option>
                    <option value="lunas">💰 Lunas</option>
                </select>

                <select id="entriesPerPage" class="glass px-5 py-4 rounded-2xl font-bold text-slate-900 border-2 border-slate-300 outline-none">
                    <option value="5">5 Data</option>
                    <option value="10" selected>10 Data</option>
                    <option value="20">20 Data</option>
                    <option value="50">50 Data</option>
                </select>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-xl overflow-hidden border-2 border-slate-900">
            <div class="overflow-x-auto custom-scroll">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr>
                            <th class="p-5 text-xs">ID</th>
                            <th class="p-5 text-xs">Madrasah</th>
                            <th class="p-5 text-xs">Status Order</th>
                            <th class="p-5 text-xs">Pembayaran</th>
                            <th class="p-5 text-xs text-center">Bukti</th>
                            <th class="p-5 text-xs text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tbody">
                        <!-- Data injected via JS -->
                    </tbody>
                </table>
            </div>
            
            <div class="p-6 bg-slate-900 text-white flex flex-col md:flex-row justify-between items-center gap-4">
                <div id="dataSummary" class="text-sm font-bold">
                    Menampilkan 0 sampai 0 dari 0 data
                </div>
                <div class="flex items-center gap-2" id="paginationControls">
                    <button id="prevPage" class="btn-pagination bg-white text-slate-900 disabled:opacity-30">
                        <i class="fas fa-chevron-left mr-2"></i> Prev
                    </button>
                    <div id="pageNumbers" class="flex gap-1"></div>
                    <button id="nextPage" class="btn-pagination bg-white text-slate-900 disabled:opacity-30">
                        Next <i class="fas fa-chevron-right ml-2"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- MODAL DETAIL -->
<div id="modalDetail" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden flex items-center justify-center z-[60] p-4">
    <div class="bg-white rounded-[2.5rem] w-full max-w-2xl p-8 shadow-2xl max-h-[90vh] overflow-y-auto custom-scroll border-4 border-slate-900">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black text-slate-900">Detail Lengkap</h2>
            <button onclick="closeDetail()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-200 hover:bg-slate-900 hover:text-white transition-all">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div id="detailContent" class="space-y-3"></div>
    </div>
</div>

<!-- MODAL VERIFIKASI -->
<div id="modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden flex items-center justify-center z-[70] p-4">
    <div class="bg-white rounded-[2.5rem] w-full max-w-md p-8 shadow-2xl border-4 border-blue-600">
        <h2 class="text-2xl font-black text-slate-900 mb-1">Verifikasi</h2>
        <p class="text-slate-500 text-sm mb-6">Update status pendaftaran ID: <span id="dId" class="font-black text-blue-600"></span></p>
        <div class="space-y-5">
            <div id="buktiWrap" class="hidden">
                <label class="block text-xs font-black text-slate-500 uppercase mb-2">Bukti Transfer</label>
                <img id="dBukti" onclick="window.open(this.src)" class="w-full h-48 object-cover rounded-2xl border-4 border-slate-100 cursor-pointer hover:border-blue-500 transition-all">
            </div>
            <div>
                <label class="block text-xs font-black text-slate-500 uppercase mb-2">Status Pesanan</label>
                <select id="dStatus" class="w-full bg-slate-50 border-2 border-slate-200 p-3.5 rounded-xl font-bold outline-none focus:border-blue-500">
                    <option value="pending">⏳ Pending (Menunggu)</option>
                    <option value="disetujui">✅ Disetujui</option>
                    <option value="ditolak">❌ Ditolak</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-black text-slate-500 uppercase mb-2">Status Pembayaran</label>
                <select id="dBayar" class="w-full bg-slate-50 border-2 border-slate-200 p-3.5 rounded-xl font-bold outline-none focus:border-blue-500">
                    <option value="belum_bayar">❌ Belum Bayar</option>
                    <option value="menunggu_verifikasi">⏳ Menunggu Verifikasi</option>
                    <option value="lunas">💰 Lunas / Terbayar</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-black text-slate-500 uppercase mb-2">Link Aplikasi CBT</label>
                <input id="dLink" class="w-full bg-slate-50 border-2 border-slate-200 p-3.5 rounded-xl font-bold outline-none focus:border-blue-500" placeholder="https://cbt.sekolah.sch.id">
            </div>
        </div>
        <div class="grid grid-cols-2 gap-3 mt-8">
            <button onclick="closeModal()" class="py-3.5 rounded-2xl font-black text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">Batal</button>
            <button id="btnSave" onclick="saveDetail()" class="py-3.5 rounded-2xl font-black text-white bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">
                Simpan Perubahan
            </button>
        </div>
    </div>
</div>

<script src="../assets/app.js"></script>
<script>
const token = localStorage.getItem("token");
if(!token) location="login.html";

let allData = [];
let selectedId = null;
let currentPage = 1;
let rowsPerPage = 10;

// fallback API
if (!window.get) window.get = async () => ({ status:"error", message:"API get() tidak ditemukan" });
if (!window.post) window.post = async () => ({ status:"error", message:"API post() tidak ditemukan" });

// ================= FIX GOOGLE DRIVE =================
function fixDriveUrl(url){
    if(!url) return "";
    let id="";
    if(url.includes("/file/d/")){
        id = url.split("/file/d/")[1]?.split("/")[0];
    } else if(url.includes("id=")){
        id = url.split("id=")[1]?.split("&")[0];
    }
    return id ? `https://drive.google.com/thumbnail?id=${id}&sz=w400` : "";
}

// ================= LOAD DATA =================
async function loadData(){
    try{
        const res = await get("dashboard");
        if(res.status !== "success") throw new Error(res.message);

        allData = res.data || [];
        render();
    }catch(err){
        document.getElementById("tbody").innerHTML =
        `<tr><td colspan="6" class="p-10 text-center text-red-500 font-bold">${err.message}</td></tr>`;
    }
}

// ================= STATUS COLOR =================
function getStatusColor(status){
    if(!status) return 'badge-slate';
    status = status.toLowerCase();

    if(status === 'disetujui' || status === 'lunas') return 'badge-emerald';
    if(status === 'pending' || status === 'menunggu_verifikasi') return 'badge-amber';
    if(status === 'ditolak') return 'badge-rose';

    return 'badge-slate';
}

// ================= RENDER =================
function render(){
    const tbody = document.getElementById("tbody");

    const search = document.getElementById("search").value.toLowerCase();
    const filterStatus = document.getElementById("filterStatus").value;
    rowsPerPage = parseInt(document.getElementById("entriesPerPage").value);

    // ===== FILTER DATA =====
    let filtered = allData.filter(r=>{
        const id = String(r.id);
        const nama = (r.nama_madrasah||"").toLowerCase();
        const hp = (r.no_hp||"").toLowerCase();
        const status = (r.status_order||"pending").toLowerCase();
        const bayar = (r.status_pembayaran||"belum_bayar").toLowerCase();

        // search
        if(search && !(`${id} ${nama} ${hp}`.includes(search))) return false;

        // filter status
        if(filterStatus){
            if(filterStatus === "lunas"){
                if(bayar !== "lunas") return false;
            } else {
                if(status !== filterStatus) return false;
            }
        }

        return true;
    });

    // ===== STATS (HARUS DARI allData, BUKAN filtered) =====
    let stats = {pending:0, approved:0, paid:0};

    allData.forEach(r=>{
        if((r.status_order||"") === "pending") stats.pending++;
        if((r.status_order||"") === "disetujui") stats.approved++;
        if((r.status_pembayaran||"") === "lunas") stats.paid++;
    });

    document.getElementById("total").innerText = allData.length;
    document.getElementById("pending").innerText = stats.pending;
    document.getElementById("approved").innerText = stats.approved;
    document.getElementById("paid").innerText = stats.paid;

    // ===== PAGINATION =====
    const totalPages = Math.ceil(filtered.length / rowsPerPage) || 1;

    if(currentPage > totalPages) currentPage = totalPages;

    const start = (currentPage-1)*rowsPerPage;
    const end = start + rowsPerPage;
    const pageData = filtered.slice(start,end);

    // ===== TABLE =====
    let html="";

    pageData.forEach(r=>{
        const status = (r.status_order||"pending").toLowerCase();
        const bayar = (r.status_pembayaran||"belum_bayar").toLowerCase();
        const bukti = fixDriveUrl(r.bukti_url);

        html += `
        <tr>
            <td class="font-mono text-xs font-bold">#${r.id}</td>
            <td>
                <div class="font-bold">${r.nama_madrasah||"-"}</div>
                <div class="text-xs text-slate-500">${r.no_hp||"-"}</div>
            </td>
            <td><span class="badge ${getStatusColor(status)}">${status}</span></td>
            <td><span class="badge ${getStatusColor(bayar)}">${bayar.replaceAll('_',' ')}</span></td>
            <td class="text-center">
                ${bukti 
                ? `<img src="${bukti}" class="w-12 h-12 rounded-xl cursor-pointer" onclick="openVerifikasi('${r.id}')">`
                : `<span class="text-slate-400">-</span>`}
            </td>
            <td class="text-right">
                <button onclick="openDetailView('${r.id}')" class="px-3 py-2 bg-slate-900 text-white rounded">Detail</button>
            </td>
        </tr>`;
    });

    tbody.innerHTML = html || `<tr><td colspan="6" class="p-10 text-center">Tidak ada data</td></tr>`;

    // ===== PAGINATION BUTTON =====
    document.getElementById("prevPage").disabled = currentPage === 1;
    document.getElementById("nextPage").disabled = currentPage === totalPages;
}

// ================= PAGINATION CONTROL =================
function changePage(p){
    currentPage = p;
    render();
}

document.getElementById("prevPage").onclick = ()=>{ currentPage--; render(); };
document.getElementById("nextPage").onclick = ()=>{ currentPage++; render(); };

// ================= DETAIL =================
function openDetailView(id){
    const r = allData.find(x=>x.id==id);
    if(!r) return;

    document.getElementById("detailContent").innerHTML = `
    <p><b>Nama:</b> ${r.nama_madrasah}</p>
    <p><b>NPSN:</b> ${r.npsn}</p>
    <p><b>Status:</b> ${r.status_order}</p>
    `;

    document.getElementById("modalDetail").classList.remove("hidden");
}

function closeDetail(){
    document.getElementById("modalDetail").classList.add("hidden");
}

// ================= VERIFIKASI =================
function openVerifikasi(id){
    const r = allData.find(x=>x.id==id);
    if(!r) return;

    selectedId = id;
    document.getElementById("dId").innerText = id;
    document.getElementById("dStatus").value = r.status_order||"pending";
    document.getElementById("dBayar").value = r.status_pembayaran||"belum_bayar";
    document.getElementById("dLink").value = r.link_cbt||"";

    document.getElementById("modal").classList.remove("hidden");
}

function closeModal(){
    document.getElementById("modal").classList.add("hidden");
}

// ================= SAVE =================
async function saveDetail(){
    try{
        const res = await post("updateStatus",{
            id:selectedId,
            status_order:document.getElementById("dStatus").value,
            status_bayar:document.getElementById("dBayar").value,
            link_cbt:document.getElementById("dLink").value
        },token);

        if(res.status==="success"){
            closeModal();
            loadData();
        }else{
            alert(res.message);
        }
    }catch(err){
        alert(err.message);
    }
}

// ================= INIT =================
window.onload = ()=>{
    loadData();

    document.getElementById("search").oninput = ()=>{ currentPage=1; render(); };
    document.getElementById("filterStatus").onchange = ()=>{ currentPage=1; render(); };
    document.getElementById("entriesPerPage").onchange = ()=>{ currentPage=1; render(); };
};
</script>
</body>
</html>
