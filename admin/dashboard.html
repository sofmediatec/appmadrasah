<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | CBT System</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; }

/* GLASS UI */
.glass-card {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(226,232,240,0.8);
}

/* HOVER CARD */
.stat-card {
    transition: 0.2s;
}
.stat-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 15px rgba(0,0,0,0.1);
}

/* SCROLL */
.custom-scrollbar::-webkit-scrollbar { width:6px;height:6px }
.custom-scrollbar::-webkit-scrollbar-thumb { background:#cbd5e1;border-radius:10px }

/* ANIMATION */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px)}
    to {opacity:1; transform:translateY(0)}
}
.animate-fade-in { animation: fadeIn .3s ease-out }
</style>
</head>

<body class="bg-[#f8fafc] text-slate-800">

<script src="../assets/app.js"></script>

<div class="min-h-screen flex">

<!-- SIDEBAR -->
<aside class="hidden md:flex w-64 bg-slate-900 text-white p-6 flex-col">
    <div class="mb-10 font-extrabold text-xl">CBT ADMIN</div>

    <nav class="space-y-2">
        <div class="bg-blue-600 p-3 rounded-xl">Dashboard</div>
    </nav>

    <button onclick="logout()" class="mt-auto text-red-400">Logout</button>
</aside>

<!-- MAIN -->
<main class="flex-1 p-6">

<!-- HEADER -->
<div class="flex justify-between mb-6">
    <div>
        <h1 class="text-3xl font-extrabold">Data Registrasi CBT</h1>
    </div>
    <div class="flex gap-2">
        <button onclick="exportExcel()" class="bg-emerald-100 px-4 py-2 rounded-xl">Excel</button>
        <button onclick="window.print()" class="bg-indigo-100 px-4 py-2 rounded-xl">Print</button>
    </div>
</div>

<!-- STATS -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
    <div class="glass-card stat-card p-4 rounded-2xl">
        <div>Total</div>
        <div id="total" class="text-3xl font-bold">0</div>
    </div>
    <div class="glass-card stat-card p-4 rounded-2xl">
        <div>Pending</div>
        <div id="pending" class="text-3xl font-bold text-yellow-500">0</div>
    </div>
    <div class="glass-card stat-card p-4 rounded-2xl">
        <div>Disetujui</div>
        <div id="approved" class="text-3xl font-bold text-green-600">0</div>
    </div>
    <div class="glass-card stat-card p-4 rounded-2xl">
        <div>Lunas</div>
        <div id="paid" class="text-3xl font-bold text-indigo-600">0</div>
    </div>
</div>

<!-- SEARCH -->
<div class="bg-white p-4 rounded-2xl mb-6">
    <input id="search" class="w-full p-3 border rounded-xl" placeholder="Cari...">
</div>

<!-- TABLE -->
<div class="bg-white rounded-2xl overflow-hidden">
<table class="w-full">
<thead class="bg-slate-100">
<tr>
<th class="p-3">ID</th>
<th class="p-3">Madrasah</th>
<th class="p-3">HP</th>
<th class="p-3">Status</th>
<th class="p-3">Bayar</th>
<th class="p-3">Bukti</th>
<th class="p-3">Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</main>
</div>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center">
<div class="bg-white p-6 rounded-2xl w-96 animate-fade-in">

<h2 class="font-bold mb-3">Detail</h2>

<div>ID: <span id="dId"></span></div>

<img id="dBukti" class="w-full h-40 object-cover rounded my-3 hidden">

<select id="dStatus" class="w-full border p-2 mb-2">
<option value="pending">Pending</option>
<option value="disetujui">Disetujui</option>
<option value="ditolak">Ditolak</option>
</select>

<select id="dBayar" class="w-full border p-2 mb-2">
<option value="belum_bayar">Belum Bayar</option>
<option value="menunggu_verifikasi">Menunggu</option>
<option value="lunas">Lunas</option>
</select>

<input id="dLink" class="w-full border p-2 mb-3" placeholder="Link CBT">

<div class="flex justify-end gap-2">
<button onclick="closeModal()">Batal</button>
<button onclick="saveDetail()" class="bg-blue-600 text-white px-3 rounded">Simpan</button>
</div>

</div>
</div>

<script>
const token = localStorage.getItem("token");
if(!token) location="login.html";

const user = JSON.parse(localStorage.getItem("user")||"{}");

let allData=[];
let selectedId=null;

/* FIX DRIVE */
function fixDriveUrl(url){
    if(!url) return "";
    let id="";
    if(url.includes("id=")) id=url.split("id=")[1];
    else{
        const m=url.match(/[-\w]{25,}/);
        if(m) id=m[0];
    }
    return id?`https://drive.google.com/uc?export=view&id=${id}`:url;
}

/* LOAD */
async function loadData(){
    const res = await get("dashboard");
    allData = res.data;
    render();
}

/* RENDER */
function render(){
    const tbody=document.getElementById("tbody");
    const search=document.getElementById("search").value.toLowerCase();

    let html="";
    let stats={pending:0,approved:0,paid:0};

    allData.forEach(r=>{
        if(search && !(`${r.id} ${r.nama_madrasah}`.toLowerCase().includes(search))) return;

        const bukti=fixDriveUrl(r.bukti_url);

        if(r.status_order==="pending")stats.pending++;
        if(r.status_order==="disetujui")stats.approved++;
        if(r.status_pembayaran==="lunas")stats.paid++;

        html+=`
        <tr class="border-b">
            <td class="p-3">${r.id}</td>
            <td>${r.nama_madrasah}</td>
            <td>${r.no_hp}</td>
            <td>${r.status_order}</td>
            <td>${r.status_pembayaran}</td>
            <td>${bukti?`<img src="${bukti}" class="w-10 h-10" onclick="openDetail('${r.id}')">`:"-"}</td>
            <td><button onclick="openDetail('${r.id}')" class="bg-blue-600 text-white px-2 py-1 rounded">Detail</button></td>
        </tr>`;
    });

    tbody.innerHTML=html;

    total.innerText=allData.length;
    pending.innerText=stats.pending;
    approved.innerText=stats.approved;
    paid.innerText=stats.paid;
}

/* MODAL */
function openDetail(id){
    const r=allData.find(x=>x.id==id);
    selectedId=id;

    dId.innerText=id;
    dStatus.value=r.status_order;
    dBayar.value=r.status_pembayaran;
    dLink.value=r.link_cbt||"";

    const bukti=fixDriveUrl(r.bukti_url);
    if(bukti){
        dBukti.src=bukti;
        dBukti.classList.remove("hidden");
    }else{
        dBukti.classList.add("hidden");
    }

    modal.classList.remove("hidden");
}

function closeModal(){
    modal.classList.add("hidden");
}

/* SAVE */
async function saveDetail(){
    await post("updateStatus",{
        id:selectedId,
        status_order:dStatus.value,
        status_bayar:dBayar.value,
        link_cbt:dLink.value
    },token);

    closeModal();
    loadData();
}

/* EXPORT */
function exportExcel(){
    let csv="ID,Nama\n";
    allData.forEach(r=>{
        csv+=`${r.id},${r.nama_madrasah}\n`;
    });

    const blob=new Blob([csv]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="data.csv";
    a.click();
}

function logout(){
    localStorage.clear();
    location="login.html";
}

window.onload=()=>{
    loadData();
    search.oninput=render;
};
</script>

</body>
</html>
