<h2>Dashboard Admin</h2>
<button onclick="load()">Load Data</button>
<table border="1" id="tabel"></table>

<script>
const API = "https://script.google.com/macros/s/AKfycbx_0KnTJot31FsnJCgLxQ32RmNvZAOqyBAetLjotDS9l_itKha5xHyMymlK6Xp8GqQQ/exec";

function load() {
  fetch(API + "?action=getOrders")
  .then(res => res.json())
  .then(data => {
    let html = "";
    data.forEach(row => {
      html += "<tr>";
      row.forEach(col => {
        html += "<td>" + col + "</td>";
      });
      html += "</tr>";
    });
    document.getElementById("tabel").innerHTML = html;
  });
}
</script>
