<!DOCTYPE html>
<html>
<head>
  <title>CBT Online</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>

<body>

<div class="container py-5">

  <!-- HERO -->
  <div class="hero text-center mb-5">
    <h1>CBT Online Madrasah</h1>
    <p>Solusi ujian online cepat & profesional</p>
    <a href="form.html" class="btn btn-light btn-lg mt-3">Ajukan Sekarang</a>
  </div>

  <!-- PAKET -->
  <h4 class="mb-3">Paket CBT</h4>
  <div class="row mb-5" id="paketList"></div>

  <!-- DAFTAR PENGGUNA -->
  <h4 class="mb-3">Daftar Pengguna CBT</h4>
  <div class="table-responsive">
    <table class="table table-bordered table-striped">
      <thead class="table-dark">
        <tr>
          <th>No</th>
          <th>Madrasah</th>
          <th>Kabupaten</th>
          <th>Paket</th>
          <th>Status</th>
          <th>Pembayaran</th>
          <th>Aksi</th>
          <th>CBT</th>
        </tr>
      </thead>
      <tbody id="userList">
        <tr><td colspan="6" class="text-center">Loading...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script src="assets/app.js"></script>

<script>
// ===================
// LOAD PAKET
// ===================
get("paket").then(res => {

  if(!res || !res.data){
    document.getElementById("paketList").innerHTML =
      `<div class="text-danger">Gagal load paket</div>`;
    return;
  }

  let html = "";

  res.data.slice(1).forEach(p => {
    html += `
    <div class="col-md-4 mb-3">
      <div class="card card-hover shadow text-center p-3">
        <h4>${p[1] || "-"}</h4>
        <p>${p[3] || 0} peserta</p>
        <h5>Rp ${Number(p[2] || 0).toLocaleString()}</h5>
      </div>
    </div>`;
  });

  document.getElementById("paketList").innerHTML = html;

}).catch(err => {
  console.error(err);
});


// ===================
// LOAD DATA USER
// ===================
get("pendaftaran").then(res => {

  console.log("DATA API:", res); // 🔍 DEBUG

  if(!res || !res.data){
    throw new Error("Response API kosong");
  }

  let html = "";
  let no = 1;

  res.data.slice(1).reverse().forEach(r => {

    const id = r[0];
    const nama = r[3] || "-";
    const kab = r[6] || "-";
    const paket = r[12] || "-";
    const status = (r[14] || "pending").toLowerCase();
    const bayar = (r[15] || "belum_bayar").toLowerCase();
    const link = r[16];

    // STATUS ORDER
    let badge = "secondary";
    if(status === "pending") badge = "warning";
    if(status === "disetujui") badge = "success";
    if(status === "ditolak") badge = "danger";

    // STATUS BAYAR
    let bayarBadge = "secondary";
    if(bayar === "menunggu_verifikasi") bayarBadge = "warning";
    if(bayar === "lunas") bayarBadge = "success";
    if(bayar === "ditolak") bayarBadge = "danger";

    // TOMBOL BAYAR
    let tombolBayar = "-";

    if(bayar === "belum_bayar" || bayar === "ditolak"){
      tombolBayar = `<a href="bayar.html?id=${id}" class="btn btn-sm btn-warning">Bayar</a>`;
    }

    if(bayar === "menunggu_verifikasi"){
      tombolBayar = `<span class="text-warning">Menunggu</span>`;
    }

    if(bayar === "lunas"){
      tombolBayar = `<span class="text-success">Lunas</span>`;
    }

    html += `
    <tr>
      <td>${no++}</td>
      <td>${nama}</td>
      <td>${kab}</td>
      <td>${paket}</td>
      <td><span class="badge bg-${badge}">${status}</span></td>
      <td><span class="badge bg-${bayarBadge}">${bayar}</span></td>
      <td>${tombolBayar}</td>
      <td>
        ${link 
          ? `<a href="${link}" target="_blank" class="btn btn-sm btn-primary">Masuk CBT</a>` 
          : '-'}
      </td>
    </tr>
    `;
  });

  if(html === ""){
    html = `<tr><td colspan="8" class="text-center">Belum ada data</td></tr>`;
  }

  document.getElementById("userList").innerHTML = html;

}).catch(err => {

  console.error("ERROR LOAD:", err);

  document.getElementById("userList").innerHTML =
    `<tr><td colspan="8" class="text-danger text-center">${err.message}</td></tr>`;
});
</script>

</body>
</html>
