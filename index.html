<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Online Madrasah | Solusi Ujian Digital</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            overflow-x: hidden;
        }
        .hero-gradient {
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
        }
        .glass-nav {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
        }
    </style>
</head>

<body class="text-slate-900">

<!-- ================= POPUP REKENING ================= -->
<div id="rekeningModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 relative animate-fadeIn">

        <button onclick="closeRekening()" class="absolute top-3 right-3 text-slate-500 hover:text-red-500 text-xl font-bold">×</button>

        <h3 class="text-xl font-black text-center mb-4">Informasi Pembayaran</h3>

        <div class="space-y-3 text-sm font-semibold text-slate-700">
            <div class="bg-slate-100 p-3 rounded-lg">
                Bank BRI<br>
                No Rekening: <b>1234567890</b><br>
                Atas Nama: <b>CBT Madrasah</b>
            </div>

            <div class="bg-slate-100 p-3 rounded-lg">
                Bank BNI<br>
                No Rekening: <b>0987654321</b><br>
                Atas Nama: <b>CBT Madrasah</b>
            </div>
        </div>

        <a id="lanjutBayar" href="#" class="block mt-6 text-center bg-blue-700 text-white py-3 rounded-xl font-bold hover:bg-blue-800">
            Lanjut Upload Bukti
        </a>

    </div>
</div>
<!-- ================= END POPUP ================= -->

<header class="glass-nav border-b border-slate-200 sticky top-0 z-40 shadow-sm">
    <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
        <div class="text-2xl font-black">CBT<span class="text-blue-700">Madrasah</span></div>
        <a href="form.html" class="bg-blue-700 text-white px-6 py-3 rounded-full">Mulai</a>
    </div>
</header>

<main>

<section class="hero-gradient text-white pt-24 pb-44 px-6 text-center">
    <h1 class="text-5xl font-black">Sistem Ujian Online</h1>
</section>

<section class="max-w-6xl mx-auto px-6 py-24">
    <div id="paketList"></div>
</section>

<section class="bg-slate-200 py-24 px-6">
    <div class="max-w-7xl mx-auto">
        <table class="w-full text-sm">
            <tbody id="userList"></tbody>
        </table>
    </div>
</section>

</main>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="assets/app.js"></script>

<script>
AOS.init({ duration: 800, once: true });

/* ================= POPUP FUNCTION ================= */
function openRekening(id){
    document.getElementById("rekeningModal").classList.remove("hidden");
    document.getElementById("rekeningModal").classList.add("flex");

    // set link lanjut bayar
    document.getElementById("lanjutBayar").href = "bayar.html?id=" + id;
}

function closeRekening(){
    document.getElementById("rekeningModal").classList.add("hidden");
    document.getElementById("rekeningModal").classList.remove("flex");
}
/* ================= END POPUP ================= */

async function loadPaket(){
    try {
        const res = await get("paket_v2");

        let html = "";
        res.data.forEach(p => {
            html += `<div>${p.nama}</div>`;
        });

        document.getElementById("paketList").innerHTML = html;

    } catch(err) {
        document.getElementById("paketList").innerHTML = err.message;
    }
}

async function loadUser(){
    const tbody = document.getElementById("userList");

    try {
        const res = await get("pendaftaran");

        let html = "";
        let no = 1;

        res.data.slice(1).reverse().forEach(r => {

            const id     = r[0];
            const nama   = r[3] || "-";
            const bayar  = (r[15] || "belum_bayar").toLowerCase();

            let tombolBayar = "-";

            if(bayar === "belum_bayar" || bayar === "ditolak"){
                // 🔥 DIGANTI KE POPUP (tanpa merusak fungsi lain)
                tombolBayar = `<button onclick="openRekening('${id}')" class="bg-amber-600 text-white px-4 py-2 rounded-lg text-xs font-bold">Bayar</button>`;
            } else if(bayar === "menunggu_verifikasi"){
                tombolBayar = `<span>Verifikasi...</span>`;
            } else if(bayar === "lunas"){
                tombolBayar = `<span>Lunas</span>`;
            }

            html += `
            <tr>
                <td>${no++}</td>
                <td>${nama}</td>
                <td>${tombolBayar}</td>
            </tr>`;
        });

        tbody.innerHTML = html;

    } catch(err) {
        tbody.innerHTML = err.message;
    }
}

window.onload = () => {
    loadPaket();
    loadUser();
};
</script>

</body>
</html>
