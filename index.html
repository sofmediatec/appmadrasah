<!DOCTYPE html>
<html>
<head>
  <title>CBT Online</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>

<body>

<div class="container py-5">

  <div class="hero text-center mb-5">
    <h1>CBT Online Madrasah</h1>
    <p>Solusi ujian online cepat & profesional</p>
    <a href="form.html" class="btn btn-light btn-lg mt-3">Ajukan Sekarang</a>
  </div>

  <div class="row" id="paketList"></div>

</div>

<script src="assets/app.js"></script>
<script>
get("paket").then(res => {
  let html = "";
  res.data.slice(1).forEach(p => {
    html += `
    <div class="col-md-4 mb-3">
      <div class="card card-hover shadow text-center p-3">
        <h4>${p[1]}</h4>
        <p>${p[3]} peserta</p>
        <h5>Rp ${p[2]}</h5>
      </div>
    </div>`;
  });
  document.getElementById("paketList").innerHTML = html;
});
</script>

</body>
</html>
