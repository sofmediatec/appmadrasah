<script src="assets/app.js"></script>

<script>
// ===================
// LOAD PAKET
// ===================
async function loadPaket(){
  try{
    const res = await get("paket");

    if(!res || !res.data){
      throw new Error("Data paket kosong");
    }

    let html = "";

    res.data.slice(1).forEach(p => {
      html += `
      <div class="col-md-4 mb-3">
        <div class="card shadow text-center p-3">
          <h4>${p[1] || "-"}</h4>
          <p>${p[3] || 0} peserta</p>
          <h5>Rp ${Number(p[2] || 0).toLocaleString()}</h5>
        </div>
      </div>`;
    });

    document.getElementById("paketList").innerHTML = html;

  }catch(err){
    document.getElementById("paketList").innerHTML =
      `<div class="text-danger">Gagal load paket</div>`;
  }
}


// ===================
// LOAD DATA USER
// ===================
async function loadUser(){

  const tbody = document.getElementById("userList");
  tbody.innerHTML = `<tr><td colspan="8" class="text-center">Loading...</td></tr>`;

  try{

    const res = await get("pendaftaran");

    if(!res || !res.data){
      throw new Error("Data tidak ditemukan");
    }

    let html = "";
    let no = 1;

    res.data.slice(1).reverse().forEach(r => {

      const id     = r[0];
      const nama   = r[3] || "-";
      const kab    = r[6] || "-";
      const paket  = r[12] || "-";
      const status = (r[14] || "pending").toLowerCase();
      const bayar  = (r[15] || "belum_bayar").toLowerCase();
      const link   = r[16] || "";

      // ===================
      // STATUS ORDER
      // ===================
      let badge = "secondary";
      if(status === "pending") badge = "warning";
      if(status === "disetujui") badge = "success";
      if(status === "ditolak") badge = "danger";

      // ===================
      // STATUS BAYAR
      // ===================
      let bayarBadge = "secondary";
      if(bayar === "menunggu_verifikasi") bayarBadge = "warning";
      if(bayar === "lunas") bayarBadge = "success";
      if(bayar === "ditolak") bayarBadge = "danger";

      // ===================
      // TOMBOL BAYAR
      // ===================
      let tombolBayar = "-";

      if(bayar === "belum_bayar" || bayar === "ditolak"){
        tombolBayar = `
          <a href="bayar.html?id=${id}" 
             class="btn btn-sm btn-warning">
             Bayar
          </a>`;
      }

      if(bayar === "menunggu_verifikasi"){
        tombolBayar = `<span class="text-warning">Menunggu Verifikasi</span>`;
      }

      if(bayar === "lunas"){
        tombolBayar = `<span class="text-success">Lunas</span>`;
      }

      // ===================
      // LINK CBT
      // ===================
      let tombolCBT = "-";

      if(link && link !== ""){
        tombolCBT = `<a href="${link}" target="_blank" class="btn btn-sm btn-primary">Masuk CBT</a>`;
      }

      html += `
      <tr>
        <td>${no++}</td>
        <td>${nama}</td>
        <td>${kab}</td>
        <td>${paket}</td>

        <td><span class="badge bg-${badge}">${status}</span></td>

        <td><span class="badge bg-${bayarBadge}">${bayar}</span></td>

        <td>${tombolBayar}</td>

        <td>${tombolCBT}</td>
      </tr>
      `;
    });

    if(html === ""){
      html = `<tr><td colspan="8" class="text-center">Belum ada data</td></tr>`;
    }

    tbody.innerHTML = html;

  }catch(err){

    console.error(err);

    tbody.innerHTML =
      `<tr><td colspan="8" class="text-danger text-center">${err.message}</td></tr>`;
  }
}


// ===================
// INIT
// ===================
loadPaket();
loadUser();

</script>
