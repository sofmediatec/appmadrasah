<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT Online Madrasah | Solusi Ujian Digital</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>
html { scroll-behavior: smooth; }

body {
    font-family: 'Inter', sans-serif;
    background-color: #f1f5f9;
}

.hero-gradient {
    background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
}

.glass-nav {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    transition: all .3s;
}

.nav-scrolled {
    backdrop-filter: blur(16px);
    background: rgba(255,255,255,0.98);
    box-shadow: 0 10px 30px rgba(0,0,0,.1);
}

/* Skeleton */
.skeleton {
    animation: pulse 1.5s infinite;
    background: #e2e8f0;
    border-radius: 6px;
}
@keyframes pulse {
    0% {opacity:.6}
    50% {opacity:1}
    100% {opacity:.6}
}
</style>
</head>

<body class="text-slate-900">

<!-- NAVBAR -->
<header id="navbar" class="glass-nav border-b sticky top-0 z-50">
<div class="max-w-6xl mx-auto px-6 h-20 flex justify-between items-center">

<div class="flex items-center space-x-3">
<div class="w-10 h-10 bg-blue-700 rounded-xl flex items-center justify-center"></div>
<span class="text-2xl font-black">CBT<span class="text-blue-700">Madrasah</span></span>
</div>

<nav class="hidden md:flex gap-8 font-bold text-sm">
<a href="#">Beranda</a>
<a href="#keunggulan">Keunggulan</a>
<a href="#paketSection">Paket</a>
<a href="#userListSection">Pengguna</a>
<a href="#footer">Kontak</a>
</nav>

<div class="flex items-center gap-3">
<a href="form.html" class="hidden md:block bg-blue-700 text-white px-6 py-3 rounded-full text-sm font-bold">Mulai</a>
<button id="menuBtn" class="md:hidden text-xl">☰</button>
</div>

</div>

<div id="mobileMenu" class="hidden bg-white border-t">
<div class="flex flex-col p-6 gap-4 font-bold">
<a href="#">Beranda</a>
<a href="#keunggulan">Keunggulan</a>
<a href="#paketSection">Paket</a>
<a href="#userListSection">Pengguna</a>
<a href="#footer">Kontak</a>
</div>
</div>
</header>

<main>

<section class="hero-gradient text-white py-32 text-center">
<h1 class="text-5xl font-black">Sistem Ujian Online</h1>
</section>

<div id="keunggulan" class="py-20 text-center">
<h2 class="text-3xl font-black">Keunggulan</h2>
</div>

<section id="paketSection" class="max-w-6xl mx-auto py-20 px-6">
<div id="paketList"></div>
</section>

<!-- USER LIST -->
<section id="userListSection" class="bg-slate-200 py-24 px-6">
<div class="max-w-7xl mx-auto">

<!-- SEARCH -->
<div class="mb-6">
<input id="searchInput" type="text" placeholder="Cari madrasah..."
class="w-full md:w-1/3 px-4 py-3 rounded-xl border font-semibold">
</div>

<div class="bg-white rounded-3xl shadow-xl overflow-hidden">

<table class="w-full text-sm">
<thead>
<tr class="bg-slate-800 text-white text-xs uppercase">
<th class="px-6 py-4">No</th>
<th class="px-6 py-4">Madrasah</th>
<th class="px-6 py-4">Kabupaten</th>
<th class="px-6 py-4">Paket</th>
<th class="px-6 py-4 text-center">Status</th>
<th class="px-6 py-4 text-center">Pembayaran</th>
<th class="px-6 py-4 text-center">Aksi</th>
<th class="px-6 py-4 text-center">Akses CBT</th>
</tr>
</thead>

<tbody id="userList">
<tr>
<td colspan="8" class="p-6">
<div class="space-y-3">
<div class="skeleton h-4 w-full"></div>
<div class="skeleton h-4 w-full"></div>
<div class="skeleton h-4 w-full"></div>
</div>
</td>
</tr>
</tbody>
</table>

</div>

<!-- PAGINATION -->
<div class="flex justify-center mt-6 gap-2" id="pagination"></div>

</div>
</section>

</main>

<footer id="footer" class="bg-slate-900 text-white p-10 text-center">
Footer
</footer>

<script src="assets/app.js"></script>

<script>
/* NAVBAR SCROLL */
window.addEventListener("scroll",()=>{
document.getElementById("navbar").classList.toggle("nav-scrolled",window.scrollY>50);
});

/* MOBILE MENU */
menuBtn.onclick=()=>mobileMenu.classList.toggle("hidden");

/* DATA GLOBAL */
let allData=[];
let currentPage=1;
const perPage=10;

/* LOAD USER */
async function loadUser(){
const res=await get("pendaftaran");
allData=res.data.slice(1).reverse().map(r=>({
id:r[0],kode:r[1]||"",madrasah:r[3]||"-",
kabupaten:r[6]||"-",paket:r[12]||"-",
status:(r[14]||"pending").toLowerCase(),
bayar:(r[15]||"belum_bayar").toLowerCase(),
link_cbt:r[16]||""
}));
renderTable();
}

/* RENDER TABLE */
function renderTable(){
let data=filterData();
let start=(currentPage-1)*perPage;
let pageData=data.slice(start,start+perPage);

let html="";
let no=start+1;

pageData.forEach(r=>{
let tombol=(r.bayar==="belum_bayar")
? `<a href="bayar.html?id=${r.id}&kode=${r.kode}" class="bg-amber-600 text-white px-3 py-1 rounded">Bayar</a>`
: `<span class="text-green-600 font-bold">Lunas</span>`;

html+=`
<tr>
<td class="px-4 py-3">${no++}</td>
<td>${r.madrasah}</td>
<td>${r.kabupaten}</td>
<td>${r.paket}</td>
<td>${r.status}</td>
<td>${r.bayar}</td>
<td>${tombol}</td>
<td>${r.link_cbt?`<a href="${r.link_cbt}" target="_blank">Buka</a>`:"-"}</td>
</tr>`;
});

userList.innerHTML=html||`<tr><td colspan="8" class="text-center p-6">Kosong</td></tr>`;
renderPagination(data.length);
}

/* SEARCH */
function filterData(){
let q=searchInput.value.toLowerCase();
return allData.filter(d=>d.madrasah.toLowerCase().includes(q));
}
searchInput.oninput=()=>{currentPage=1;renderTable();};

/* PAGINATION */
function renderPagination(total){
let pages=Math.ceil(total/perPage);
let html="";
for(let i=1;i<=pages;i++){
html+=`<button onclick="gotoPage(${i})" class="px-3 py-1 border ${i===currentPage?'bg-blue-700 text-white':''}">${i}</button>`;
}
pagination.innerHTML=html;
}
function gotoPage(p){currentPage=p;renderTable();}

/* INIT */
window.onload=()=>{
loadUser();
};
</script>

</body>
</html>
