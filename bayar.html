<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konfirmasi Pembayaran | CBT Madrasah</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background-color: #f1f5f9;
}
.hero-mini {
    background: linear-gradient(135deg, #059669 0%, #065f46 100%);
}
.form-input {
    @apply w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none bg-slate-50;
}
.form-label {
    @apply block text-xs font-black uppercase tracking-widest text-slate-500 mb-2;
}
.file-input-wrapper {
    @apply border-2 border-dashed border-slate-200 rounded-2xl p-6 text-center hover:border-emerald-400 transition bg-slate-50 cursor-pointer;
}
</style>
</head>

<body class="pb-20">

<!-- HEADER -->
<header class="hero-mini py-12 text-center text-white">
    <h1 class="text-3xl font-black" data-aos="fade-down">Konfirmasi Bayar</h1>
    <p data-aos="fade-up">Upload bukti transfer Anda</p>
</header>

<main class="max-w-xl mx-auto px-6 -mt-10">

<!-- INFO -->
<div class="bg-emerald-900 text-white rounded-2xl p-5 mb-6 flex justify-between">
    <div>
        <small>ID</small>
        <div id="idText">...</div>
    </div>
    <div>
        <small>Kode</small>
        <div id="kodeText">...</div>
    </div>
</div>

<!-- FORM -->
<form id="formBayar" class="bg-white p-6 rounded-2xl shadow">

<input type="hidden" id="pendaftaran_id">

<div class="mb-4">
<label class="form-label">Nama Pengirim</label>
<input class="form-input" name="nama_pengirim" required>
</div>

<div class="grid grid-cols-2 gap-4 mb-4">
<div>
<label class="form-label">Bank</label>
<input class="form-input" name="bank" required>
</div>
<div>
<label class="form-label">Jumlah</label>
<input type="number" class="form-input" name="jumlah_transfer" required>
</div>
</div>

<!-- FILE FIXED -->
<div class="mb-6">
<label class="form-label">Bukti Transfer</label>

<div class="file-input-wrapper">
<label for="file">
<div id="fileInfo">
<p class="text-gray-500">Klik pilih file</p>
</div>
</label>

<input type="file" id="file" class="hidden" accept="image/*,.pdf">
</div>

</div>

<button id="btnBayar" class="w-full bg-emerald-600 text-white py-3 rounded-xl">
Kirim Bukti
</button>

</form>

</main>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="assets/app.js"></script>

<script>
AOS.init();

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");
const kode = urlParams.get("kode");

if(!id){
    alert("ID tidak ditemukan");
    location.href="form.html";
}

document.getElementById("pendaftaran_id").value = id;
document.getElementById("idText").innerText = id;
document.getElementById("kodeText").innerText = kode || "-";

const fileInput = document.getElementById("file");
const fileInfo = document.getElementById("fileInfo");

fileInput.onchange = function(){
    if(this.files[0]){
        fileInfo.innerHTML = `<b>${this.files[0].name}</b>`;
    }
};

function toBase64(file){
    return new Promise((resolve,reject)=>{
        const reader = new FileReader();
        reader.onload = ()=> resolve(reader.result.split(",")[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

document.getElementById("formBayar").onsubmit = async function(e){
e.preventDefault();

const btn = document.getElementById("btnBayar");
btn.innerText="Loading...";
btn.disabled=true;

try{
    const file = fileInput.files[0];

    if(!file) throw new Error("File belum dipilih");
    if(file.size > 2*1024*1024) throw new Error("Max 2MB");

    const base64 = await toBase64(file);

    const res = await post("bayar", {
        pendaftaran_id: id,
        nama_pengirim: this.nama_pengirim.value,
        bank: this.bank.value,
        jumlah_transfer: this.jumlah_transfer.value,
        file: base64,
        filename: file.name
    });

    if(res.status !== "success") throw new Error(res.message);

    alert("Berhasil upload");
    location.href="index.html";

}catch(err){
    alert(err.message);
    btn.innerText="Kirim Bukti";
    btn.disabled=false;
}

};
</script>

</body>
</html>
