<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konfirmasi Pembayaran</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }
.hero { background: linear-gradient(135deg,#059669,#065f46); }
</style>
</head>

<body class="bg-slate-100">

<!-- HEADER -->
<header class="hero text-white text-center py-14">
<h1 class="text-3xl font-black">Konfirmasi Bayar</h1>
<p class="opacity-90">Upload bukti transfer</p>
</header>

<main class="max-w-xl mx-auto px-6 -mt-10">

<!-- INFO -->
<div class="bg-emerald-900 text-white rounded-2xl p-5 mb-6 flex justify-between">
<div>
<small>ID</small>
<div id="idText">...</div>
</div>
<div class="text-right">
<small>Kode</small>
<div id="kodeText">...</div>
</div>
</div>

<!-- FORM -->
<form id="formBayar" class="bg-white p-8 rounded-3xl shadow-lg space-y-5">

<input type="hidden" id="pendaftaran_id">

<!-- INPUT -->
<div>
<label class="text-xs font-bold text-slate-500">Nama Pengirim</label>
<input name="nama_pengirim"
class="w-full mt-1 px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-400 outline-none"
required>
</div>

<div class="grid grid-cols-2 gap-4">
<div>
<label class="text-xs font-bold text-slate-500">Bank</label>
<input name="bank"
class="w-full mt-1 px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-400"
required>
</div>

<div>
<label class="text-xs font-bold text-slate-500">Jumlah</label>
<input type="number" name="jumlah_transfer"
class="w-full mt-1 px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-400"
required>
</div>
</div>

<!-- FILE -->
<div>
<label class="text-xs font-bold text-slate-500">Bukti Transfer</label>

<label for="file"
class="mt-2 block border-2 border-dashed border-slate-300 rounded-xl p-6 text-center cursor-pointer hover:border-emerald-400">

<input type="file" id="file" class="hidden">

<div id="fileInfo">
<p class="text-slate-500">Klik pilih file</p>
<p class="text-xs text-slate-400">Max 2MB</p>
</div>

</label>
</div>

<!-- BUTTON CENTER -->
<div class="flex justify-center pt-4">
<button id="btnBayar"
class="px-10 py-4 rounded-2xl text-white font-bold 
bg-gradient-to-r from-emerald-600 to-emerald-500
hover:from-emerald-700 hover:to-emerald-600
shadow-lg transition">

<span id="btnText">Kirim Bukti Pembayaran</span>
</button>
</div>

</form>

</main>

<script src="assets/app.js"></script>

<script>
const params = new URLSearchParams(location.search);

const id = params.get("id");
const kode = params.get("kode");

document.getElementById("idText").innerText = id || "-";
document.getElementById("kodeText").innerText = kode || "-";

const fileInput = document.getElementById("file");
const fileInfo = document.getElementById("fileInfo");

fileInput.onchange = function(){
if(this.files[0]){
fileInfo.innerHTML = `<b class="text-emerald-600">${this.files[0].name}</b>`;
}
};

function toBase64(file){
return new Promise((res,rej)=>{
const r=new FileReader();
r.onload=()=>res(r.result.split(",")[1]);
r.readAsDataURL(file);
});
}

document.getElementById("formBayar").onsubmit=async function(e){
e.preventDefault();

const btnText = document.getElementById("btnText");
btnText.innerText="Loading...";

try{
const file=fileInput.files[0];
if(!file) throw "Pilih file";

const base64=await toBase64(file);

await post("bayar",{
  pendaftaran_id: id,
  nama_pengirim: this.nama_pengirim.value,
  bank: this.bank.value,
  jumlah_transfer: this.jumlah_transfer.value,
  file: base64,
  filename: file.name
});

alert("Berhasil");
location.href="index.html";

}catch(err){
alert(err);
btnText.innerText="Kirim Bukti Pembayaran";
}
};
</script>

</body>
</html>
