<!DOCTYPE html>
<html>
<head>
  <title>Pembayaran CBT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container py-5">

<div class="card shadow p-4">

  <h3 class="mb-3">Upload Pembayaran</h3>

  <!-- INFO ORDER -->
  <div class="alert alert-info">
    <div><strong>ID:</strong> <span id="idText"></span></div>
    <div><strong>Kode:</strong> <span id="kodeText"></span></div>
  </div>

  <form id="formBayar">

    <!-- hidden id -->
    <input type="hidden" name="pendaftaran_id" id="pendaftaran_id">

    <input class="form-control mb-2" name="nama_pengirim" placeholder="Nama Pengirim" required>
    <input class="form-control mb-2" name="bank" placeholder="Bank (BCA/BRI/DLL)" required>
    <input class="form-control mb-2" name="jumlah_transfer" placeholder="Jumlah Transfer" type="number" required>
    <input class="form-control mb-3" name="bukti_transfer" placeholder="Link Bukti Transfer (Google Drive / dll)" required>

    <button class="btn btn-success w-100" id="btnBayar">Kirim Bukti</button>

  </form>

</div>

<script src="assets/app.js"></script>

<script>
// ========================
// AMBIL PARAMETER URL
// ========================
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");
const kode = urlParams.get("kode");

// validasi
if(!id){
  alert("ID tidak ditemukan, silakan daftar ulang");
  window.location = "form.html";
}

// set ke form
document.getElementById("pendaftaran_id").value = id;
document.getElementById("idText").innerText = id;
document.getElementById("kodeText").innerText = kode || "-";

// ========================
// SUBMIT
// ========================
document.getElementById("formBayar").onsubmit = function(e){
  e.preventDefault();

  const btn = document.getElementById("btnBayar");
  btn.innerText = "Mengirim...";
  btn.disabled = true;

  const data = Object.fromEntries(new FormData(this));

  // validasi tambahan
  if(!data.nama_pengirim || !data.jumlah_transfer || !data.bukti_transfer){
    alert("Lengkapi semua data");
    btn.innerText = "Kirim Bukti";
    btn.disabled = false;
    return;
  }

  post("bayar", data).then(res => {

    if(res.status !== "success"){
      alert(res.message || "Gagal upload");
      btn.innerText = "Kirim Bukti";
      btn.disabled = false;
      return;
    }

    alert("Bukti pembayaran berhasil dikirim!");

    // redirect ke halaman utama / info
    window.location = "index.php";

  }).catch(() => {
    alert("Terjadi kesalahan jaringan");
    btn.innerText = "Kirim Bukti";
    btn.disabled = false;
  });
};
</script>

</body>
</html>
