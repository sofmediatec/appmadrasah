<!DOCTYPE html>
<html>
<head>
  <title>Pembayaran</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container py-5">

<h3>Upload Pembayaran</h3>

<form id="formBayar">

<input class="form-control mb-2" name="pendaftaran_id" placeholder="ID Pendaftaran">
<input class="form-control mb-2" name="nama_pengirim" placeholder="Nama Pengirim">
<input class="form-control mb-2" name="bank" placeholder="Bank">
<input class="form-control mb-2" name="jumlah_transfer" placeholder="Jumlah Transfer">
<input class="form-control mb-2" name="bukti_transfer" placeholder="Link Bukti Transfer">

<button class="btn btn-success w-100">Kirim</button>
</form>

<script src="assets/app.js"></script>
<script>
document.getElementById("formBayar").onsubmit = function(e){
  e.preventDefault();
  const data = Object.fromEntries(new FormData(this));

  post("bayar", data).then(() => {
    alert("Bukti dikirim!");
  });
}
</script>

</body>
</html>
