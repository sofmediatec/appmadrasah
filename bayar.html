<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konfirmasi Pembayaran</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }
.hero { background: linear-gradient(135deg,#059669,#065f46); }
</style>
</head>

<body class="bg-slate-100">

<!-- HEADER -->
<header class="hero text-white text-center py-14">
<h1 class="text-3xl font-black">Konfirmasi Bayar</h1>
<p class="opacity-90">Upload bukti transfer</p>
</header>

<main class="max-w-xl mx-auto px-6 -mt-10">

<!-- INFO -->
<div class="bg-emerald-900 text-white rounded-2xl p-5 mb-6 flex justify-between">
<div>
<small>ID</small>
<div id="idText">...</div>
</div>
<div class="text-right">
<small>Kode</small>
<div id="kodeText">...</div>
</div>
</div>

<!-- FORM -->
<form id="formBayar" class="bg-white p-8 rounded-3xl shadow-lg space-y-5">

<input type="hidden" id="pendaftaran_id">

<!-- INPUT -->
<div>
<label class="text-xs font-bold text-slate-500">Nama Pengirim</label>
<input name="nama_pengirim"
class="w-full mt-1 px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-400 outline-none"
required>
</div>

<div class="grid grid-cols-2 gap-4">
<div>
<label class="text-xs font-bold text-slate-500">Bank</label>
<input name="bank"
class="w-full mt-1 px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-400"
required>
</div>

<div>
<label class="text-xs font-bold text-slate-500">Jumlah</label>
<input type="number" name="jumlah_transfer"
class="w-full mt-1 px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-400"
required>
</div>
</div>

<!-- FILE -->
<div>
<label class="text-xs font-bold text-slate-500">Bukti Transfer</label>

<label for="file"
class="mt-2 block border-2 border-dashed border-slate-300 rounded-xl p-6 text-center cursor-pointer hover:border-emerald-400">

<input type="file" id="file" name="file" accept="image/*" class="hidden" required>

<div id="fileInfo">
<p class="text-slate-500">Klik pilih file</p>
<p class="text-xs text-slate-400">Max 2MB</p>
</div>

</label>
</div>

<!-- BUTTON CENTER -->
<div class="flex justify-center pt-4">
<button id="btnBayar"
class="px-10 py-4 rounded-2xl text-white font-bold 
bg-gradient-to-r from-emerald-600 to-emerald-500
hover:from-emerald-700 hover:to-emerald-600
shadow-lg transition">

<span id="btnText">Kirim Bukti Pembayaran</span>
</button>
</div>

</form>

</main>

<script src="assets/app.js"></script>

<script>
if(!id){
    alert("ID tidak ditemukan");
    location.href = "index.html";
}
    
const params = new URLSearchParams(location.search);

const id = params.get("id");
const kode = params.get("kode");

document.getElementById("idText").innerText = id || "-";
document.getElementById("kodeText").innerText = kode || "-";

const fileInput = document.getElementById("file");
const fileInfo = document.getElementById("fileInfo");
    
// ✅ VALIDASI + PREVIEW NAMA FILE
fileInput.onchange = function(){
    const file = this.files[0];

    if(!file) return;
    console.log(file.type);
    console.log(file.size);
    
    // validasi harus gambar
    if(!file.type.startsWith("image/")){
        alert("Wajib upload gambar!");
        fileInput.value = "";
        fileInfo.innerHTML = `<p class="text-red-500 text-xs">File harus gambar</p>`;
        return;
    }

    // max 2MB
    if(file.size > 2 * 1024 * 1024){
        alert("Max file 2MB");
        fileInput.value = "";
        fileInfo.innerHTML = `<p class="text-red-500 text-xs">File terlalu besar</p>`;
        return;
    }

    fileInfo.innerHTML = `<b class="text-emerald-600">${file.name}</b>`;
};
}

// SUBMIT FORM
const btn = document.getElementById("btnBayar");
btn.disabled = true;
    
function compressImage(file, maxWidth = 700, quality = 0.6){
    return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = function(e){
            const img = new Image();
            img.src = e.target.result;

            img.onload = function(){
                const canvas = document.createElement("canvas");
                const scale = Math.min(maxWidth / img.width, 1);

                canvas.width = img.width * scale;
                canvas.height = img.height * scale;

                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                // convert ke base64 JPEG terkompres
                const base64 = canvas.toDataURL("image/jpeg", quality).split(",")[1];

                resolve({
                    base64,
                    mimeType: "image/jpeg",
                    filename: file.name.replace(/\.\w+$/, ".jpg")
                });
            };

            img.onerror = reject;
        };

        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}
document.getElementById("formBayar").onsubmit = async function(e){
    e.preventDefault();

    const btn = document.getElementById("btnBayar");
    const btnText = document.getElementById("btnText");

    btn.disabled = true;
    btnText.innerText = "Loading...";

    try{
        const file = fileInput.files[0];

        if(!file) throw "Pilih gambar dulu";

        if(!file.type.startsWith("image/")){
            throw "File harus gambar";
        }

        if(file.size > 2 * 1024 * 1024){
            throw "Max file 2MB";
        }

        btnText.innerText = "Mengompres gambar...";
        const compressed = await compressImage(file);

        const res = await post("bayar",{
            pendaftaran_id: id,
            nama_pengirim: this.nama_pengirim.value,
            bank: this.bank.value,
            jumlah_transfer: this.jumlah_transfer.value,
            file: compressed.base64,
            filename: compressed.filename,
            mimeType: compressed.mimeType
        });

        console.log(res);

        if(!res || res.status !== "success"){
            throw res?.message || "Gagal simpan ke server";
        }

        alert("Berhasil upload bukti");
        location.href = "index.html";

    }catch(err){
        alert(err);
        btn.disabled = false;
        btnText.innerText = "Kirim Bukti Pembayaran";

        fileInput.value = "";
        fileInfo.innerHTML = `
        <p class="text-slate-500">Klik pilih file</p>
        <p class="text-xs text-slate-400">Max 2MB</p>`;
    }
};
</script>

</body>
</html>
