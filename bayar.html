<!DOCTYPE html>
<html>
<head>
  <title>Pembayaran CBT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container py-5">

<div class="card shadow p-4">

  <h3 class="mb-3">Upload Pembayaran</h3>

  <!-- INFO ORDER -->
  <div class="alert alert-info">
    <div><strong>ID:</strong> <span id="idText"></span></div>
    <div><strong>Kode:</strong> <span id="kodeText"></span></div>
  </div>

  <form id="formBayar">

    <!-- hidden id -->
    <input type="hidden" name="pendaftaran_id" id="pendaftaran_id">

    <input class="form-control mb-2" name="nama_pengirim" placeholder="Nama Pengirim" required>

    <input class="form-control mb-2" name="bank" placeholder="Bank (BCA/BRI/DLL)" required>

    <input class="form-control mb-2" name="jumlah_transfer" type="number" placeholder="Jumlah Transfer" required>

    <!-- 🔥 FILE UPLOAD -->
    <input type="file" class="form-control mb-3" id="file" accept="image/*,.pdf" required>

    <small class="text-muted d-block mb-3">
      Maksimal 2MB (JPG, PNG, PDF)
    </small>

    <button class="btn btn-success w-100" id="btnBayar">
      Kirim Bukti
    </button>

  </form>

</div>

<script src="assets/app.js"></script>

<script>
// ========================
// AMBIL PARAMETER URL
// ========================
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");
const kode = urlParams.get("kode");

// validasi ID
if(!id){
  alert("ID tidak ditemukan, silakan daftar ulang");
  window.location = "form.html";
}

// set tampilan
document.getElementById("pendaftaran_id").value = id;
document.getElementById("idText").innerText = id;
document.getElementById("kodeText").innerText = kode || "-";

// ========================
// KONVERSI FILE → BASE64
// ========================
function toBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onload = () => {
      try{
        const base64 = reader.result.split(",")[1];
        resolve(base64);
      }catch(e){
        reject("Gagal membaca file");
      }
    };

    reader.onerror = () => reject("File tidak bisa dibaca");

    reader.readAsDataURL(file);
  });
}

// ========================
// SUBMIT FORM
// ========================
document.getElementById("formBayar").onsubmit = async function(e){
  e.preventDefault();

  const btn = document.getElementById("btnBayar");
  btn.innerText = "Mengupload...";
  btn.disabled = true;

  try{

    const formData = new FormData(this);

    const nama_pengirim = formData.get("nama_pengirim");
    const bank = formData.get("bank");
    const jumlah_transfer = formData.get("jumlah_transfer");

    const fileInput = document.getElementById("file");
    const file = fileInput.files[0];

    // ========================
    // VALIDASI
    // ========================
    if(!nama_pengirim || !bank || !jumlah_transfer){
      throw new Error("Semua field wajib diisi");
    }

    if(!file){
      throw new Error("Pilih file bukti transfer");
    }

    // validasi ukuran (2MB)
    if(file.size > 2 * 1024 * 1024){
      throw new Error("Ukuran file maksimal 2MB");
    }

    // ========================
    // KONVERSI FILE
    // ========================
    const base64 = await toBase64(file);

    // ========================
    // KIRIM KE API
    // ========================
    const res = await post("bayar", {
      pendaftaran_id: id,
      nama_pengirim,
      bank,
      jumlah_transfer,
      file: base64,
      filename: file.name
    });

    if(!res || res.status !== "success"){
      throw new Error(res?.message || "Gagal upload");
    }

    alert("Bukti pembayaran berhasil dikirim!");

    // redirect
    window.location = "index.html";

  }catch(err){

    alert(err.message || "Terjadi kesalahan");

    btn.innerText = "Kirim Bukti";
    btn.disabled = false;
  }
};
</script>

</body>
</html>
