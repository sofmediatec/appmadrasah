<!DOCTYPE html>
<html>
<head>
  <title>Daftar CBT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container py-5">

<h3>Form Pendaftaran CBT</h3>

<form id="form">

<input class="form-control mb-2" name="nama_madrasah" placeholder="Nama Madrasah">
<input class="form-control mb-2" name="npsn" placeholder="NPSN">
<input class="form-control mb-2" name="alamat" placeholder="Alamat">
<input class="form-control mb-2" name="kabupaten" placeholder="Kabupaten">
<input class="form-control mb-2" name="provinsi" placeholder="Provinsi">
<input class="form-control mb-2" name="penanggung_jawab" placeholder="Penanggung Jawab">
<input class="form-control mb-2" name="no_hp" placeholder="No HP">
<input class="form-control mb-2" name="email" placeholder="Email">
<input class="form-control mb-2" name="jumlah_peserta" placeholder="Jumlah Peserta">

<select class="form-control mb-3" name="paket_id">
<option value="1">Basic</option>
<option value="2">Standard</option>
<option value="3">Premium</option>
</select>

<button class="btn btn-primary w-100">Kirim</button>
</form>

<script src="assets/app.js"></script>
<script>
document.getElementById("form").onsubmit = function(e){
  e.preventDefault();
  const data = Object.fromEntries(new FormData(this));

  data.harga = data.paket_id == 1 ? 100000 :
               data.paket_id == 2 ? 250000 : 500000;

  post("daftar", data).then(res => {
    alert("Berhasil daftar. Kode: " + res.kode);
    window.location = "bayar.html?id=" + res.kode;
  });
}
</script>

</body>
</html>
